<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f7fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" onerror="window.__noxlsx=true"></script>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --ink:#1c2130; --muted:#6b7280;
    --line:#e5e7ef; --accent:#4f46e5; --accent-soft:#eef0fe;
    --green:#16a34a; --green-soft:#e7f6ec; --red:#dc2626; --red-soft:#fdecec;
    --amber:#b45309; --amber-soft:#fdf3e3;
    --radius:16px; --shadow:0 1px 3px rgba(28,33,48,.08),0 4px 14px rgba(28,33,48,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Atkinson Hyperlegible",-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:17px; line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom);
  }
  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* ---------- header ---------- */
  .hdr{
    position:sticky;top:0;z-index:20;background:rgba(246,247,251,.94);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:flex;align-items:center;gap:8px;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    border-bottom:1px solid var(--line);
  }
  .hdr h1{font-size:20px;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
  .hdr .sub{display:block;font-size:12.5px;color:var(--muted);font-weight:400;line-height:1.2}
  .iconbtn{
    border:none;background:none;color:var(--accent);font:inherit;font-weight:700;
    padding:8px 10px;border-radius:10px;cursor:pointer;flex-shrink:0;
    display:inline-flex;align-items:center;gap:6px;font-size:15.5px;
  }
  .iconbtn:active{background:var(--accent-soft)}
  .backbtn{margin-left:-8px;font-size:24px;line-height:1;padding:6px 10px}

  .content{padding:16px 14px 32px;flex:1;display:flex;flex-direction:column}
  .section-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:18px 4px 8px}

  /* ---------- list rows ---------- */
  .rowlist{display:flex;flex-direction:column;gap:10px}
  .row{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    display:flex;align-items:center;gap:12px;padding:14px;
    border:1px solid transparent;cursor:pointer;text-align:left;width:100%;font:inherit;color:inherit;
  }
  .row:active{border-color:var(--accent)}
  .row .emoji{font-size:24px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);border-radius:12px}
  .row .rmain{flex:1;min-width:0}
  .row .rtitle{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .rsub{font-size:14px;color:var(--muted)}
  .row .chev{color:#c3c7d4;font-size:20px;flex-shrink:0}
  .trash{
    border:none;background:none;color:#a6abbd;font-size:19px;padding:10px;cursor:pointer;
    border-radius:10px;flex-shrink:0;line-height:1;
  }
  .trash:active{color:var(--red);background:var(--red-soft)}

  /* question rows */
  .qrow{align-items:flex-start;cursor:pointer}
  .qnum{
    flex-shrink:0;min-width:34px;height:34px;border-radius:10px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--muted);
    padding:0 6px;
  }
  .qtext{flex:1;min-width:0}
  .qq{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:700;font-size:15.5px}
  .qa{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;color:var(--muted);font-size:14px;margin-top:2px}
  .chips{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:700;padding:2px 9px;border-radius:999px}
  .chip.mem{background:var(--green-soft);color:var(--green)}
  .chip.right{background:var(--green-soft);color:var(--green)}
  .chip.wrong{background:var(--red-soft);color:var(--red)}
  .chip.pend{background:var(--bg);color:var(--muted)}
  .selbox{
    flex-shrink:0;width:26px;height:26px;border-radius:8px;border:2px solid #c3c7d4;margin-top:4px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;
  }
  .selbox.on{background:var(--accent);border-color:var(--accent)}

  /* ---------- buttons ---------- */
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    border:none;border-radius:14px;padding:15px 18px;font:inherit;font-weight:700;font-size:16.5px;
    cursor:pointer;color:#fff;background:var(--accent);
  }
  .btn:active{filter:brightness(.92)}
  .btn.ghost{background:var(--card);color:var(--accent);border:1.5px dashed #c7cbf5;box-shadow:none}
  .btn.soft{background:var(--accent-soft);color:var(--accent)}
  .btn.warn{background:var(--red);color:#fff}
  .btn.plain{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .btn.sm{padding:10px 14px;font-size:14.5px;border-radius:11px;width:auto}
  .btnrow{display:flex;gap:10px}
  .btnrow .btn{flex:1}

  .empty{
    text-align:center;color:var(--muted);padding:44px 20px;font-size:15.5px;
  }
  .empty .big{font-size:44px;display:block;margin-bottom:10px}

  /* ---------- study modes ---------- */
  .study{display:flex;flex-direction:column;flex:1;gap:14px}
  .progress{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);font-weight:700}
  .pbar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .25s}
  .modechip{font-size:12px;font-weight:700;background:var(--accent-soft);color:var(--accent);padding:3px 10px;border-radius:999px;white-space:nowrap}

  .fcard{
    background:var(--card);border-radius:20px;box-shadow:var(--shadow);
    padding:22px 20px;display:flex;flex-direction:column;gap:14px;min-height:180px;
  }
  .flabel{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .ftext{font-size:20px;font-weight:700;line-height:1.45;overflow-wrap:anywhere}
  .fanswer{font-size:18.5px;line-height:1.55;overflow-wrap:anywhere}
  .fcard.ans{border:1.5px solid #dfe2f9;background:#fbfbff}
  .tappable{cursor:pointer;user-select:none;-webkit-user-select:none}
  .tappable:active{transform:scale(.99)}
  .hiddenbox{
    background:var(--bg);border:1.5px dashed #c9cdda;border-radius:12px;color:var(--muted);
    text-align:center;padding:26px 14px;font-size:15.5px;
  }
  .blank{
    background:#e4e6f2;border-radius:5px;color:transparent;user-select:none;
  }
  .studyctl{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
  .navrow{display:flex;align-items:center;gap:10px}
  .navbtn{
    flex-shrink:0;width:54px;height:54px;border-radius:14px;border:none;background:var(--card);
    box-shadow:var(--shadow);font-size:22px;color:var(--ink);cursor:pointer;
  }
  .navbtn:disabled{opacity:.35}
  .navrow .btn{flex:1}

  .completebtn{background:var(--card);color:var(--green);border:1.5px solid var(--green);box-shadow:none}
  .completebtn.on{background:var(--green);color:#fff;border-color:var(--green)}
  .npbtn{background:var(--card);color:var(--amber);border:1.5px solid #ecd7ae;box-shadow:none;font-size:15px}
  .npbtn.on{background:var(--amber-soft);border-color:var(--amber)}
  .chip.np{background:var(--amber-soft);color:var(--amber)}
  .modechip.np{background:var(--amber-soft);color:var(--amber)}
  .seg{display:flex;background:#e9ebf3;border-radius:13px;padding:4px;gap:4px;margin-bottom:10px}
  .seg button{flex:1;border:none;background:none;font:inherit;font-weight:700;font-size:14px;padding:10px 6px;border-radius:10px;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .seg button.npseg.on{color:var(--amber)}
  .seg button.dis{opacity:.45}

  .markrow{display:flex;justify-content:center;gap:34px;padding:4px 0}
  .markwrap{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:13.5px;font-weight:700;color:var(--muted)}
  .markbtn{
    width:66px;height:66px;border-radius:50%;border:none;cursor:pointer;color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);
  }
  .markbtn svg{width:30px;height:30px}
  .markbtn.right{background:var(--green)}
  .markbtn.wrong{background:var(--red)}
  .markbtn.sel{outline:4px solid rgba(28,33,48,.18);outline-offset:2px}
  .markbtn:active{filter:brightness(.9)}

  .doneScreen{text-align:center;padding:40px 16px;display:flex;flex-direction:column;gap:8px;align-items:center}
  .doneScreen .big{font-size:52px}
  .doneScreen h2{margin:4px 0 2px}
  .doneScreen p{color:var(--muted);margin:0 0 16px}
  .doneScreen .btn{max-width:320px}

  /* ---------- summary ---------- */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .stat{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px}
  .stat .n{font-size:24px;font-weight:700;line-height:1.15}
  .stat .l{font-size:13px;color:var(--muted);font-weight:700}
  .stat.g .n{color:var(--green)} .stat.r .n{color:var(--red)} .stat.a .n{color:var(--amber)}
  .sumbar{display:flex;height:10px;border-radius:99px;overflow:hidden;background:var(--line);margin:8px 0 2px}
  .sumbar i{display:block;height:100%}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);font-weight:700;margin-top:6px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(20,24,38,.45);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
  }
  @media(min-width:520px){.overlay{align-items:center}}
  .sheet{
    background:var(--card);width:100%;max-width:520px;border-radius:22px 22px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:88vh;overflow:auto;
  }
  @media(min-width:520px){.sheet{border-radius:22px}}
  .sheet h2{margin:0 0 4px;font-size:19px}
  .sheet .hint{color:var(--muted);font-size:14px;margin:0 0 14px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:13.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input[type=text],.field textarea{
    width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font:inherit;font-size:16px;
    background:var(--bg);color:var(--ink);
  }
  .field textarea{min-height:84px;resize:vertical}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .tabbar{display:flex;background:var(--bg);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px}
  .tabbar button{
    flex:1;border:none;background:none;font:inherit;font-weight:700;font-size:14.5px;padding:9px;border-radius:9px;
    color:var(--muted);cursor:pointer;
  }
  .tabbar button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .filebtn{
    display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed #c7cbf5;border-radius:14px;
    padding:22px;color:var(--accent);font-weight:700;cursor:pointer;background:var(--accent-soft);
  }
  .preview{background:var(--bg);border-radius:12px;padding:12px;margin:12px 0;font-size:14px}
  .preview .pv{padding:7px 0;border-bottom:1px solid var(--line)}
  .preview .pv:last-child{border-bottom:none}
  .preview .pvq{font-weight:700}
  .preview .pva{color:var(--muted)}
  .err{color:var(--red);font-size:14px;font-weight:700;margin:8px 0}

  /* select-mode action bar */
  .selbar{
    position:sticky;bottom:0;z-index:15;background:var(--card);border-top:1px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;
    margin:auto -14px 0;box-shadow:0 -4px 14px rgba(28,33,48,.06);
  }
  .selbar .btn{flex:1}
  .fadein{animation:fi .18s ease}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>

<script>
"use strict";
/* ============================== data ============================== */
const LS = "flashcards.v1";
let db = load();
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LS));
    if (d && Array.isArray(d.folders)) return d;
  }catch(e){}
  return { folders: [] };
}
function save(){ localStorage.setItem(LS, JSON.stringify(db)); }
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

const folderById = id => db.folders.find(f => f.id === id);
const deckById = (fid,did) => { const f = folderById(fid); return f && f.decks.find(d => d.id === did); };

/* ============================== state ============================== */
let route = { view:"home" };                 // home | folder | deck | study | summary | deckSummary
let study = null;                            // {fid,did,mode,ids,filter,i,flipped,reveal,done}
let selMode = false, selSet = new Set();
let filterByDeck = {};                       // deckId -> "all" | "np" (session-only)

function deckFilter(did){ return filterByDeck[did] || "all"; }
function setFilter(did, f){ filterByDeck[did] = f; render(); }

function go(r){
  route = r; selMode = false; selSet.clear();
  window.scrollTo(0,0); render();
}

/* ============================== helpers ============================== */
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function deckStats(deck){
  const t = deck.cards.length;
  let mem=0, right=0, wrong=0, np=0;
  for (const c of deck.cards){
    if (c.memorized) mem++;
    if (c.needsPractice) np++;
    if (c.test === "right") right++;
    else if (c.test === "wrong") wrong++;
  }
  return { total:t, mem, notMem:t-mem, right, wrong, untested:t-right-wrong, np };
}
function nextNum(deck){
  let m = 0;
  for (const c of deck.cards){ const n = parseInt(c.num,10); if (!isNaN(n) && n > m) m = n; }
  return m + 1;
}

/* ============================== modal ============================== */
function openModal(html, onMount){
  const root = document.getElementById("modal-root");
  root.innerHTML = `<div class="overlay" id="ovl"><div class="sheet fadein">${html}</div></div>`;
  document.getElementById("ovl").addEventListener("click", e => { if (e.target.id === "ovl") closeModal(); });
  if (onMount) onMount(root);
}
function closeModal(){ document.getElementById("modal-root").innerHTML = ""; }

function confirmModal(title, msg, okLabel, onOk){
  openModal(`
    <h2>${esc(title)}</h2>
    <p class="hint">${esc(msg)}</p>
    <div class="btnrow">
      <button class="btn plain" onclick="closeModal()">Cancel</button>
      <button class="btn warn" id="ok">${esc(okLabel)}</button>
    </div>`,
    () => document.getElementById("ok").onclick = () => { closeModal(); onOk(); });
}
function promptModal(title, label, placeholder, okLabel, onOk){
  openModal(`
    <h2>${esc(title)}</h2>
    <div class="field"><label>${esc(label)}</label>
      <input type="text" id="pmv" placeholder="${esc(placeholder)}" autocomplete="off"></div>
    <div class="btnrow">
      <button class="btn plain" onclick="closeModal()">Cancel</button>
      <button class="btn" id="ok">${esc(okLabel)}</button>
    </div>`,
    () => {
      const inp = document.getElementById("pmv");
      inp.focus();
      const submit = () => { const v = inp.value.trim(); if (!v) return; closeModal(); onOk(v); };
      document.getElementById("ok").onclick = submit;
      inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    });
}

/* ============================== render root ============================== */
function render(){
  const app = document.getElementById("app");
  if (route.view === "home") app.innerHTML = vHome();
  else if (route.view === "folder") app.innerHTML = vFolder();
  else if (route.view === "deck") app.innerHTML = vDeck();
  else if (route.view === "study") app.innerHTML = vStudy();
  else if (route.view === "summary") app.innerHTML = vSummary();
  else if (route.view === "deckSummary") app.innerHTML = vDeckSummary();
}

/* ============================== home ============================== */
function vHome(){
  const rows = db.folders.map(f => `
    <div class="row" onclick="go({view:'folder',fid:'${f.id}'})" role="button">
      <div class="emoji">📁</div>
      <div class="rmain">
        <div class="rtitle">${esc(f.name)}</div>
        <div class="rsub">${f.decks.length} ${f.decks.length===1?"deck":"decks"} · ${f.decks.reduce((a,d)=>a+d.cards.length,0)} questions</div>
      </div>
      <button class="trash" onclick="event.stopPropagation();delFolder('${f.id}')" aria-label="Delete folder">🗑</button>
      <span class="chev">›</span>
    </div>`).join("");
  return `
    <div class="hdr">
      <h1>🗂 Flashcards</h1>
      <button class="iconbtn" onclick="go({view:'summary'})">📊 Summary</button>
    </div>
    <div class="content">
      ${db.folders.length ? `<div class="rowlist">${rows}</div>` :
        `<div class="empty"><span class="big">👋</span>Welcome! Create a folder to organize your flashcard decks.</div>`}
      <div style="margin-top:14px">
        <button class="btn ghost" onclick="addFolder()">＋ New Folder</button>
      </div>
      <div class="section-title">Backup</div>
      <div class="btnrow">
        <button class="btn plain" onclick="exportBackup()">⬆️ Export</button>
        <button class="btn plain" onclick="pickRestoreFile()">⬇️ Restore</button>
      </div>
      <p style="color:var(--muted);font-size:13.5px;margin:10px 4px 0">
        Export saves all folders, decks, questions, and progress to a file.
        Use Restore on another device (e.g. your phone) to load it.
      </p>
      <input type="file" id="restorefile" accept=".json,application/json" style="display:none" onchange="handleRestoreFile(event)">
    </div>`;
}
function addFolder(){
  promptModal("New Folder","Folder name","e.g. Biology","Create", name => {
    db.folders.push({ id:uid(), name, decks:[] }); save(); render();
  });
}
function delFolder(fid){
  const f = folderById(fid);
  confirmModal("Delete folder?", `“${f.name}” and all of its decks and questions will be deleted. This can’t be undone.`, "Delete", () => {
    db.folders = db.folders.filter(x => x.id !== fid); save();
    if (route.view !== "home") go({view:"home"}); else render();
  });
}

/* ============================== backup / restore ============================== */
function dbCounts(folders){
  let decks = 0, cards = 0;
  for (const f of folders){ decks += f.decks.length; for (const d of f.decks) cards += d.cards.length; }
  return { folders: folders.length, decks, cards };
}
function exportBackup(){
  const payload = {
    app: "flashcards", version: 1,
    exportedAt: new Date().toISOString(),
    folders: db.folders
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `flashcards-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}
function pickRestoreFile(){
  const inp = document.getElementById("restorefile");
  inp.value = ""; inp.click();
}
function handleRestoreFile(e){
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    let data;
    try{ data = JSON.parse(ev.target.result); }
    catch(err){ openModal(`<h2>Restore failed</h2><p class="hint">That file isn’t a valid backup (couldn’t read it as JSON).</p><button class="btn" onclick="closeModal()">OK</button>`); return; }
    const folders = normalizeBackup(data);
    if (!folders){
      openModal(`<h2>Restore failed</h2><p class="hint">That file doesn’t look like a Flashcards backup. Pick a file created with the Export button.</p><button class="btn" onclick="closeModal()">OK</button>`);
      return;
    }
    const nw = dbCounts(folders), cur = dbCounts(db.folders);
    const pl = (n, w) => `${n} ${w}${n === 1 ? "" : "s"}`;
    confirmModal(
      "Restore backup?",
      `The backup has ${pl(nw.folders,"folder")}, ${pl(nw.decks,"deck")}, and ${pl(nw.cards,"question")}. ` +
      (cur.cards || cur.folders
        ? `It will REPLACE everything currently in the app (${pl(cur.folders,"folder")}, ${pl(cur.decks,"deck")}, ${pl(cur.cards,"question")}).`
        : `The app is currently empty, so nothing will be lost.`),
      "Restore",
      () => { db = { folders }; save(); render(); }
    );
  };
  r.readAsText(file);
}
function normalizeBackup(data){
  const src = data && Array.isArray(data.folders) ? data.folders
            : Array.isArray(data) ? data : null;
  if (!src) return null;
  const folders = [];
  for (const f of src){
    if (!f || typeof f.name !== "string" || !Array.isArray(f.decks)) return null;
    const decks = [];
    for (const d of f.decks){
      if (!d || typeof d.name !== "string" || !Array.isArray(d.cards)) return null;
      const cards = [];
      for (const c of d.cards){
        if (!c || typeof c.q !== "string" || typeof c.a !== "string") return null;
        cards.push({
          id: typeof c.id === "string" ? c.id : uid(),
          num: String(c.num ?? ""),
          q: c.q, a: c.a,
          memorized: c.memorized === true,
          needsPractice: c.needsPractice === true,
          test: c.test === "right" || c.test === "wrong" ? c.test : null
        });
      }
      decks.push({ id: typeof d.id === "string" ? d.id : uid(), name: d.name, cards });
    }
    folders.push({ id: typeof f.id === "string" ? f.id : uid(), name: f.name, decks });
  }
  return folders;
}

function wireImport(){

function handleImportFile(e){
  const file = e.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  if (name.endsWith(".xlsx") || name.endsWith(".xls")){
    if (window.__noxlsx || typeof XLSX === "undefined"){
      showImportError("Excel support needs an internet connection the first time. You can also save your sheet as CSV and import that.");
      return;
    }
    const r = new FileReader();
    r.onload = ev => {
      try{
        const wb = XLSX.read(ev.target.result, { type:"array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:"" });
        showImportPreview(normalizeRows(rows));
      }catch(err){ showImportError("Couldn’t read that Excel file. Try saving it as CSV."); }
    };
    r.readAsArrayBuffer(file);
  } else {
    const r = new FileReader();
    r.onload = ev => showImportPreview(parseDelimited(ev.target.result));
    r.readAsText(file);
  }
}
/* CSV/TSV parser (handles quoted fields) */
function parseDelimited(text){
  text = String(text || "").replace(/^﻿/, "");
  if (!text.trim()) return [];
  const firstLine = text.slice(0, text.indexOf("\n") < 0 ? text.length : text.indexOf("\n"));
  const delim = firstLine.includes("\t") ? "\t" : ",";
  const rows = []; let row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i];
    if (inQ){
      if (ch === '"'){ if (text[i+1] === '"'){ cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === delim){ row.push(cell); cell = ""; }
    else if (ch === "\n" || ch === "\r"){
      if (ch === "\r" && text[i+1] === "\n") i++;
      row.push(cell); rows.push(row); row = []; cell = "";
    } else cell += ch;
  }
  row.push(cell); rows.push(row);
  return normalizeRows(rows);
}
function normalizeRows(rows){
  const out = [];
  for (const r of rows){
    if (!r || !r.length) continue;
    const cells = r.map(x => String(x ?? "").trim());
    if (cells.every(x => !x)) continue;
    let num, q, a;
    if (cells.length >= 3){ [num, q, a] = cells; }
    else if (cells.length === 2){ num = ""; [q, a] = cells; }
    else continue;
    out.push({ num, q, a });
  }
  // drop header row like "# | Question | Answer"
  if (out.length){
    const h = out[0];
    const hq = h.q.toLowerCase(), ha = h.a.toLowerCase(), hn = h.num.toLowerCase();
    if (hq.includes("question") || ha.includes("answer") || hn === "#" || hn === "no" || hn === "number") out.shift();
  }
  return out.filter(r => r.q && r.a);
}
function showImportError(msg){
  document.getElementById("imp-result").innerHTML = `<div class="err">${esc(msg)}</div>`;
}
function showImportPreview(rows){
  pendingRows = rows;
  const box = document.getElementById("imp-result");
  if (!rows.length){
    box.innerHTML = `<div class="err">No questions found. Check that rows have a Question and an Answer column.</div>`;
    return;
  }
  const pv = rows.slice(0,3).map(r => `
    <div class="pv"><div class="pvq">${esc(r.num ? r.num + ". " : "")}${esc(r.q)}</div>
    <div class="pva">${esc(r.a)}</div></div>`).join("");
  box.innerHTML = `
    <div class="preview">${pv}${rows.length>3?`<div class="pv pva">…and ${rows.length-3} more</div>`:""}</div>
    <button class="btn" id="doimp">Import ${rows.length} ${rows.length===1?"Question":"Questions"}</button>`;
  document.getElementById("doimp").onclick = doImport;
}
function doImport(){
  const d = deckById(route.fid, route.did);
  let n = nextNum(d);
  for (const r of pendingRows){
    d.cards.push({ id:uid(), num: r.num || String(n), q:r.q, a:r.a, memorized:false, needsPractice:false, test:null });
    n++;
  }
  save(); closeModal(); render();
}

/* ============================== study ============================== */
const MODE_NAMES = { practice:"Practice", blank:"Fill In The Blank", test:"Test" };
function startStudy(mode){
  const d = deckById(route.fid, route.did);
  if (!d || !d.cards.length) return;
  const filter = deckFilter(d.id);
  const ids = d.cards.filter(c => filter === "np" ? c.needsPractice : true).map(c => c.id);
  if (!ids.length) return;
  study = { fid:route.fid, did:route.did, mode, ids, filter, i:0, flipped:false, reveal:false, done:false };
  go({ view:"study", fid:route.fid, did:route.did });
}
function curCard(){
  const d = deckById(study.fid, study.did);
  return d && d.cards.find(x => x.id === study.ids[study.i]);
}
function exitStudy(){ const s = study; study = null; go({ view:"deck", fid:s.fid, did:s.did }); }
function flipCard(){ study.flipped = true; study.reveal = false; render(); }
function toggleFlip(){ study.flipped = !study.flipped; study.reveal = false; render(); }
function toggleReveal(){ study.reveal = !study.reveal; render(); }
function nextCard(){
  if (study.i >= study.ids.length - 1){ study.done = true; }
  else { study.i++; study.flipped = false; study.reveal = false; }
  render();
}
function prevCard(){
  if (study.i === 0) return;
  study.i--; study.flipped = false; study.reveal = false; render();
}
function restartStudy(){ study.i = 0; study.flipped = false; study.reveal = false; study.done = false; render(); }
function toggleComplete(){
  const c = curCard();
  c.memorized = !c.memorized;
  if (!c.memorized) c.needsPractice = false;
  save(); render();
}
function toggleNP(){
  const c = curCard();
  c.needsPractice = !c.needsPractice;
  save(); render();
}
function markTest(res){
  const c = curCard();
  c.test = (c.test === res) ? null : res;
  save(); render();
  if (c.test !== null) setTimeout(() => { if (study && !study.done) nextCard(); }, 350);
}

      : `<div class="hiddenbox fadein">🙈 Answer hidden — say it out loud, then check yourself.</div>`;
    controls = `
      <button class="btn soft" onclick="toggleReveal()">${study.reveal ? "Hide answer" : "Show answer"}</button>
      <div class="markrow">
        <div class="markwrap">
          <button class="markbtn right ${c.test==="right"?"sel":""}" onclick="markTest('right')" aria-label="Mark right">${svgCheck}</button>
          Right
        </div>
        <div class="markwrap">
          <button class="markbtn wrong ${c.test==="wrong"?"sel":""}" onclick="markTest('wrong')" aria-label="Mark wrong">${svgX}</button>
          Wrong
        </div>
      </div>
      ${npBtn}`;
  }

  return `${hdr}
    <div class="content study">
      ${progress}
      ${qCard}
      ${ansCard}
      <div class="studyctl">
        ${controls}
        <div class="navrow">
          <button class="navbtn" onclick="prevCard()" ${study.i===0?"disabled":""} aria-label="Previous">‹</button>
          ${study.flipped ? "" : `<div style="flex:1"></div>`}
          ${study.flipped ? `<button class="btn plain" onclick="nextCard()">Next ›</button>` : ""}
          ${study.flipped ? "" : `<button class="navbtn" onclick="nextCard()" aria-label="Next">›</button>`}
        </div>
      </div>
    </div>`;
}

/* ============================== summary ============================== */
function vSummary(){
  const allDecks = [];
  for (const f of db.folders) for (const d of f.decks) allDecks.push({ f, d, s: deckStats(d) });
  const tot = allDecks.reduce((acc,x) => {
    acc.total += x.s.total; acc.mem += x.s.mem; acc.right += x.s.right; acc.wrong += x.s.wrong; return acc;
  }, { total:0, mem:0, right:0, wrong:0 });

  let body;
  if (!tot.total){
    body = `<div class="empty"><span class="big">📊</span>Nothing to summarize yet.<br>Add some questions and start studying!</div>`;
  } else {
    const groups = db.folders.filter(f => f.decks.length).map(f => `
      <div class="section-title">📁 ${esc(f.name)}</div>
      <div class="rowlist">
        ${f.decks.map(d => {
          const s = deckStats(d);
          return `
          <div class="row" onclick="go({view:'deckSummary',fid:'${f.id}',did:'${d.id}',from:'summary'})" role="button">
            <div class="rmain">
              <div class="rtitle">${esc(d.name)}</div>
              <div class="sumbar">
                ${s.total ? `
                <i style="width:${(s.mem/s.total)*100}%;background:var(--green)"></i>
                <i style="width:${((s.total-s.mem)/s.total)*100}%;background:var(--line)"></i>` : ""}
              </div>
              <div class="rsub">🧠 ${s.mem}/${s.total} memorized · ✓ ${s.right} right · ✗ ${s.wrong} wrong${s.np ? ` · ⚠ ${s.np} needs practice` : ""}</div>
            </div>
            <span class="chev">›</span>
          </div>`;}).join("")}
      </div>`).join("");
    body = `
      <div class="statgrid">
        <div class="stat g"><div class="n">${tot.mem}</div><div class="l">Memorized</div></div>
        <div class="stat a"><div class="n">${tot.total - tot.mem}</div><div class="l">Still learning</div></div>
        <div class="stat g"><div class="n">${tot.right}</div><div class="l">Test: right</div></div>
        <div class="stat r"><div class="n">${tot.wrong}</div><div class="l">Test: wrong</div></div>
      </div>
      ${groups}`;
  }
  return `
    <div class="hdr">
      <button class="iconbtn backbtn" onclick="go({view:'home'})" aria-label="Back">‹</button>
      <h1>📊 Summary</h1>
    </div>
    <div class="content">${body}</div>`;
}

function vDeckSummary(){
  const f = folderById(route.fid), d = deckById(route.fid, route.did);
  if (!d) return vSummary();
  const s = deckStats(d);
  const back = route.from === "summary"
    ? `go({view:'summary'})` : `go({view:'deck',fid:'${route.fid}',did:'${route.did}'})`;

  const item = (c, chips) => `
    <div class="row qrow" style="cursor:default">
      <div class="qnum">${esc(c.num)}</div>
      <div class="qtext">
        <div class="qq">${esc(c.q)}</div>
        <div class="qa">${esc(c.a)}</div>
        <div class="chips">${chips}</div>
      </div>
    </div>`;
  const list = (cards, chipFn, emptyMsg) => cards.length
    ? `<div class="rowlist">${cards.map(c => item(c, chipFn(c))).join("")}</div>`
    : `<div class="empty" style="padding:18px">${emptyMsg}</div>`;

  const mem = d.cards.filter(c => c.memorized);
  const notMem = d.cards.filter(c => !c.memorized);
  const right = d.cards.filter(c => c.test === "right");
  const wrong = d.cards.filter(c => c.test === "wrong");
  const untested = d.cards.filter(c => !c.test);

  return `
    <div class="hdr">
      <button class="iconbtn backbtn" onclick="${back}" aria-label="Back">‹</button>
      <h1>${esc(d.name)}<span class="sub">${esc(f.name)} · Summary</span></h1>
    </div>
    <div class="content">
      <div class="statgrid">
        <div class="stat g"><div class="n">${s.mem}</div><div class="l">Memorized</div></div>
        <div class="stat a"><div class="n">${s.notMem}</div><div class="l">Still learning</div></div>
        <div class="stat g"><div class="n">${s.right}</div><div class="l">Test: right</div></div>
        <div class="stat r"><div class="n">${s.wrong}</div><div class="l">Test: wrong</div></div>
      </div>

      <div class="section-title">🧠 Memorization</div>
      <div class="sumbar">
        <i style="width:${s.total?(s.mem/s.total)*100:0}%;background:var(--green)"></i>
        <i style="width:${s.total?(s.notMem/s.total)*100:0}%;background:var(--line)"></i>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--green)"></span>Memorized (${s.mem})</span>
        <span><span class="dot" style="background:#c9cdda"></span>Not yet (${s.notMem})</span>
      </div>
      <div class="section-title">Memorized</div>
      ${list(mem, () => `<span class="chip mem">✓ Memorized</span>`, "Nothing memorized yet — you’ll get there!")}
      <div class="section-title">Not memorized yet</div>
      ${list(notMem, () => `<span class="chip pend">Still learning</span>`, "Everything is memorized. 🎉")}
      <div class="section-title">⚠ Needs practice</div>
      ${list(d.cards.filter(c => c.needsPractice), () => `<span class="chip np">⚠ Needs practice</span>`, "Nothing is marked as needing practice.")}

      <div class="section-title" style="margin-top:26px">🎯 Test results</div>
      <div class="sumbar">
        <i style="width:${s.total?(s.right/s.total)*100:0}%;background:var(--green)"></i>
        <i style="width:${s.total?(s.wrong/s.total)*100:0}%;background:var(--red)"></i>
        <i style="width:${s.total?(s.untested/s.total)*100:0}%;background:transparent"></i>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--green)"></span>Right (${s.right})</span>
        <span><span class="dot" style="background:var(--red)"></span>Wrong (${s.wrong})</span>
        <span><span class="dot" style="background:#c9cdda"></span>Untested (${s.untested})</span>
      </div>
      <div class="section-title">Right</div>
      ${list(right, () => `<span class="chip right">✓ Right</span>`, "No right answers recorded yet.")}
      <div class="section-title">Wrong</div>
      ${list(wrong, () => `<span class="chip wrong">✗ Wrong</span>`, "No wrong answers recorded.")}
      ${untested.length ? `<div class="section-title">Not tested yet</div>
      ${list(untested, () => `<span class="chip pend">Untested</span>`, "")}` : ""}

      <div class="btnrow" style="margin-top:22px">
        <button class="btn plain" onclick="resetDeck('memorized')">Reset memorized</button>
        <button class="btn plain" onclick="resetDeck('test')">Reset test results</button>
      </div>
    </div>`;
}
function resetDeck(kind){
  const d = deckById(route.fid, route.did);
  const label = kind === "test" ? "test results" : "memorized marks";
  confirmModal(`Reset ${label}?`, `All ${label} in “${d.name}” will be cleared.`, "Reset", () => {
    for (const c of d.cards){ if (kind === "test") c.test = null; else { c.memorized = false; c.needsPractice = false; } }
    save(); render();
  });
}

render();
</script>
</body>
</html>
