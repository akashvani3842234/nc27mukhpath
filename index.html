 hoy, to mane anant svarūp prāpt thāy evi ichchhā karo.\" Shitaḷdāse tem karyu, paṇ kai thayu nahi. Pachhi Shriji Mahārāje kahyu, \"Have evi ichchhā karo ke jo hu (Shriji Mahārāj) sarvopari hou, to mane anant svarūp prāpt thāy.\" Jem ja Shitaḷdāse ā sankalp karyo, tem ja Shriji Mahārāj anant svarūpe pragat thayā. Tyārabād Shitaḷdāse eksāthe saunu pūjan karyu. Pachhi teo samādhimāthi jāgyā. Have temne Shriji Mahārājnā mahimāno drudh nishchay thai gayo hato. Temne saune potāno anubhav janāvyō: \"Shriji Mahārāj sarvopari, sarvāvatāri Bhagvān chhe.\"","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-3","num":"3","q":"Bhai Atmanand Swami Understands Supremacy","a":"Sadguru Bhāyātmānand Swāmino ek prasang ahi vichārie. Teo vachan ni murti gaṇātā. Teo e Shriharinu ek paṇ vachan hethu padvā didhu na hātu. Dehabhāvno bhukko bolāvine akhaṇd ātmā rupe vartanārā hatā. Temni umar 116 varshni thai hati. E vakhat teo e Aksharbrahma Guṇātitānand Swāmi Mahārājne puchhyu, 'Mane kai vāsanā nathi, chhatā Mahārāj kem tedvā āvatā nathi?' Tyāre Guṇātitānand Swāmi Mahārāje kahyu, 'Tamne haju Mahārājnā sarvopari svarupni pāki nishthā thai nathi. Shrijimahārājne tame bahu vahālā chho, ne Mahārājni āgnā akhaṇd pāḷanārā chho, ne Mahārāj paṇ tamne bahu vahālā chhe, ne mahāsamarth chho, paṇ Mahārājnu svarup jevu chhe tevu yathārth jāṇvāmā tamāre kāink pher chhe. Māte Mahārāj em jāṇe chhe je, ā Ātmānand Swāmi mane bahu vahālā chhe ne māri murti vinā te rahi shake evā nathi, te zhāzhā divas jivine paṇ mārā svarupne jem chhe tem jāṇine pachhi deh muke to māri samipmā rahevānu emne sukh āve. Em vichārine tamāro deh Mahārāj rākhye jāy chhe. Tethi Mahārāj tedvā āvatā nathi. Māte Shrijimahārājnā svarupni hu tamne vāt karu, te pramāṇe antarmā utārine jivmā ged besādi dyo, to pachhi tamāro deh tarat Mahārāj mukāvi deshe.' Pachhi Swāmie, temne Mahārāje je je prasange pote sarvopari Bhagvān chhe evi vāt kareli, te prasango yād karāvine Mahārājnā sarvopari svarupni drudhatā karāvi. Pachhi thodā samay bād Mahārāj temne dhāmmā lai gayā.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-4","num":"4","q":"Protecting the Devotees from the Governor of Visnagar","a":"Jyāre Visnagarno Subo Haribhakto ne trās āpto hato, tyāre Mahārāj rātre Gadhadāthi eklā nikaḷi gayā hatā. Muḷji Brahmachāri temani pāchhaḷ dodyā ane temne pakadi pādyā. Tyāre Mahārāje Brahmachārine kahyu: \"Visnagarno Subo āpṇā Haribhakto ne duḥkh de chhe. Tethi hu tyā jāu chhu.\" Ā sāmbhaḷi Brahmachārine āshcharya thayu. Teṇe hāth jodi kahyu: \"Are Prabhu! Te to mahādveshi chhe. Āp tyā eklā jaine shu karsho? Te to bole chhe ke Swāminārāyaṇ jo ahi āve to hu tene kedmā puri daish!\" Mahārāj ā sāmbhaḷi hasyā. Temne kahyu: \"Brahmachāri! Tame amne shu samjo chho?\" \"Mahārāj! Āp Bhagvān chho.\" \"To pachhi Subānā nādi-prāṇ konā hāthmā chhe?\" Mahārājnā ā prashnano uttar Brahmachāri āpi shakyā nahi. Mahārāje Brahmachārine māthe hāth pheravyo. Temne kahyu: \"Bhaktonā duḥkhni vahāre to javu joie ne! E to amāru birud chhe.\" Etlu kahine Mahārāje Brahmachārino hāth pakadyo ane āgaḷ vāt pakadi. Ām, Mahārāj Visnagar pahochyā ane Visnagarnā Subāthi āpṇā Haribhaktoni rakshā kari.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-5","num":"5","q":"Abhe Sinh Attains Firm Faith","a":"Lodhikāvāḷā Abhesinh Darbārne Shriharini sarvopari nishthā besti na hati. Guṇātitānand Swāmi Mahārāje temne Shriharini vāṇi, temanā prasangone ādhāre khub vāto kari; chhatā shankā thayā kare. Tyāre Swāmie kahyu, \"Tris lakshaṇe yukt evā sādhu ame kharā ke nahi?\" Teo e kahyu, 'Hā'. Swāmi kahe, \"Evā sādhu hoy te khotu bole?\" Teo kahe, 'Nā'. Swāmi kahe, \"Ā ame tamne kahie chhie je, Mahārāj sarvopari chhe. Te amāre vachane karine māno.\" Abhesinhne tarat nishthā besi gai. Abhesinhe Guṇātitānand Swāminu nirmaḷ jivan pratyaksh joyu hātu ane teo jāṇtā hatā ke Swāmi sāchā Satpurush chhe. Ā shraddhānā kāraṇe, Guṇātitānand Swāminānā vachano sāmbhaḷtā ja temne Mahārājni sarvoparitāmā drudh nishchay thai gayo.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-6","num":"6","q":"Jaha Sadguru Khele Vasant","a":"Shrijimahārāje Sārangpurmā Rāthod Dhādhalne gher samaiyo Hutāshanino karyo tyāre pote hori bole ke '.... Sadguru khele vasant.' Em boli Muktānand Swāmine ne Ānand Swāmine kahe ke evā Sadguru koṇ? Tyāre te bannē kahe: evā Sadguru āp. Tyāre Mahārāj kahe: \"Hamo to sākshāt Sadgurunā upāsya Purushottam Bhagvān chhie. Ne evā Sadguru to ā Guṇātitānand Swāmi muḷ Akshar chhe.\" Tem kahi Swāmini chhātimā chhadi adādine kahyu ke, \"Jugo jug jivo evā jogi, jugo jug jivo evā jogiyā.\" Em boli pratham Shrijimahārāje pote ja Swāmino mahimā Shrimukhe kahyo chhe.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-7","num":"7","q":"Maharaj's Eternal Residence Akshardham","a":"Panchāḷāmā Zhiṇābhāini darbārmā pānchso paramhansoni panktimā Swāmi jamtā hatā. Tyāre Vaṇthaḷivāḷā Kalyāṇbhāine Mahārāje kahyu ke 'Ā sādhune oḷakho chho?' To kahe: 'Hā, bahu motā tapasvi ne tyāgi, mahimāvāḷā chhe.' To kahe: 'Em nahi. Teo amāre akhaṇd rahevānu Akshardhām chhe.' Em Kalyāṇbhāine pote Mahārāje nishchay karāvelo.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-8","num":"8","q":"Washing Blankets and Swami's Greatness","a":"Ek vakhatē (Swāmine) Shrijimahārāje māndā sādhuni sevāmā rākhhyā hatā. Tyāre māndāni godadio dhovā jatā, bijā sāra sādhuoe paṇ Swāmine sevā karanār jāṇi (godadio dhovā) āpi hati. Temni adhār godadi dhoi Gomtithi āvtā traṇ darvājā pāse Swāmi āvyā. Ne Mahārāj Vāsaṇ Sutārne gher jamine āvyā. Te Hanumān nā darvājā bahār Swāmie dithā ne Swāmini vrutti parovāi etale Mahārāj ubhā rahyā ne Swāmi āvyā tyāre kahe: 'Jaie?' Tyāre kahe, 'Jāv.' Pachhi Harimaṇdapmā jaine (Mahārāj) Bhagujine kahe, 'E sādhue godadio amāri par dhari chhe. To te upādi lāvo.' Pachhi be pāḷā jaine upādi lāvyā. Pachhi Swāmine kahe: 'Jeni hoy te godadio lai jāy.' Pachhi māndā sādhu hatā te lai gayā paṇ sājā to sharamāyā. Te dash (sādhu) godadi levā na āvyā. Tyāre Mahārāje sabhā karine Brahmānand Swāmine kahyu ke, 'Āp ā sādhune oḷakho chho?' To kahe: 'Hā, bahu kirtan bole. Bahu sevā kare ne tyāgi nishchaye sampurṇa chhe.' Tyāre Mahārāj kahe, 'Em nahi, e to akhaṇd amāri murti traṇ avasthāmā dhāri rahyā chhe. Ne āj jetlā māṇas māri vāse phare chhe tetlā māṇas temani pāchhaḷ pharshe. Ne amārā jevi motap thashe ne amāru sarvopari gnān te pravartāvshe.' Vagere Swāmino bahu mahimā Shrijie kahel.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-9","num":"9","q":"Appointment as Mahant of Junagadh","a":"Ek vakhat Shrijimahārāj Gadhadāmā birājmān hatā tyāre Shrijimahārājne Brahmānand Swāmie kahyu ke, 'Bijā mandirnā mānat (mahant) to āpṇe karyā, paṇ Junāgadhnā mānat to vichārine karsho.' Tyāre Mahārāj kahe, 'Junāgadhnā mānat to kadi nahi phare tevā karish.' Em kahi Swāmine sabhāmā bolāvyā ne Mahārāje kahyu ke, 'Ā Guṇātitānand Swāmi Junāgadhnā mānat.' Em kahi potānā kanthmāthi hār utārine paherāvyā. Tyāre Swāmi kahe, 'Mārāthi thāy nahi.' To Mahārāj kahe: 'Meṁ to āpne hār āpyo. Ne have bijā koi le to tene āpo ne tamo āḷaso.' Te vakhate Gopāḷānand Swāmi kahe: 'Shrijimahārājni ichchhā chhe to bhale āp rākho.' Tyāre Mahārāj kahe: 'Ā Gopāḷānand Swāmi tamārā kārbhāri.' Kahi Swāmine mānat karyā. Te vakhate Pipḷāṇānā Kunvarji Dave ne (Kurji Dave) Shrijimahārāj kahe, 'Āp Rāmānand Swāmini vadhāmaṇi lai Loj āvyā tyāre Muktānand Swāmie māthāno bāndhvāno tarafāḷ āpyo ne me kahyu ke māri pāse kaśhu nathi. Hu to tamne Akshardhām āpish. Te kolni te vāt tamne sāmbhare chhe?' To kahe: 'Hā.' 'To Guṇātitānand Swāmi Akshardhām chhe. Te tamne āpyā. Māte akhaṇd sevā karsho.'","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-10","num":"10","q":"Malji Soni's Darshan of Akshardham","a":"Ek vakhat Vartālmā be deshnā gādini Āchārya bhegā thayā hatā. Tyāre sabhāmā gām Bhoykānā Mālji Soni Vartāl āvelā. Te sabhāmā thodāk sādhu bharāyelā. Te vakhate traṇ hār laine āvyā ne bannē Āchāryane be hār paherāvyā, ne ek hār Gopāḷānand Swāmine paherāvyō. Pachhi Gopāḷānand Swāmi pāse bethā, ne Swāmine kahe, 'Swāmi! Akshardhām kevu hashe?' Tyāre kahe, 'Tāre jovu chhe?' To kahe, 'Hā Swāmi, āp samarth chho te dekhādo to sāru.' Tyāre Swāmi kahe, 'Ā māri pāse bethā (chhe te) Guṇātitānand Swāmi te ja Akshar chhe. Te oḷakhi lyo.'","memorized":false,"needsPractice":false,"test":null}]}]}]};
let db = load();
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(LS));
    if (d && Array.isArray(d.folders)) return d;
  }catch(e){}
  return JSON.parse(JSON.stringify(SEED));
}
function save(){ localStorage.setItem(LS, JSON.stringify(db)); }
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);

const folderById = id => db.folders.find(f => f.id === id);
const deckById = (fid,did) => { const f = folderById(fid); return f && f.decks.find(d => d.id === did); };

/* ============================== state ============================== */
let route = { view:"home" };                 // home | folder | deck | study | summary | deckSummary
let study = null;                            // {fid,did,mode,ids,filter,i,flipped,reveal,done}
let selMode = false, selSet = new Set();
let filterByDeck = {};                       // deckId -> "all" | "np" (session-only)

function deckFilter(did){ return filterByDeck[did] || "all"; }
function setFilter(did, f){ filterByDeck[did] = f; render(); }
function filterPred(filter){
  if (filter === "np") return c => c.needsPractice;
  if (filter === "notmem") return c => !c.memorized;
  return () => true;
}
const FILTER_NAMES = { all:"All", notmem:"Not Memorized", np:"Needs Practice" };

function go(r){
  route = r; selMode = false; selSet.clear();
  window.scrollTo(0,0); render();
}

/* ============================== helpers ============================== */
function esc(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}
function deckStats(deck){
  const t = deck.cards.length;
  let mem=0, right=0, wrong=0, np=0;
  for (const c of deck.cards){
    if (c.memorized) mem++;
    if (c.needsPractice) np++;
    if (c.test === "right") right++;
    else if (c.test === "wrong") wrong++;
  }
  return { total:t, mem, notMem:t-mem, right, wrong, untested:t-right-wrong, np };
}
function nextNum(deck){
  let m = 0;
  for (const c of deck.cards){ const n = parseInt(c.num,10); if (!isNaN(n) && n > m) m = n; }
  return m + 1;
}

/* ============================== modal ============================== */
function openModal(html, onMount){
  const root = document.getElementById("modal-root");
  root.innerHTML = `<div class="overlay" id="ovl"><div class="sheet fadein">${html}</div></div>`;
  document.getElementById("ovl").addEventListener("click", e => { if (e.target.id === "ovl") closeModal(); });
  if (onMount) onMount(root);
}
function closeModal(){ document.getElementById("modal-root").innerHTML = ""; }

function confirmModal(title, msg, okLabel, onOk){
  openModal(`
    <h2>${esc(title)}</h2>
    <p class="hint">${esc(msg)}</p>
    <div class="btnrow">
      <button class="btn plain" onclick="closeModal()">Cancel</button>
      <button class="btn warn" id="ok">${esc(okLabel)}</button>
    </div>`,
    () => document.getElementById("ok").onclick = () => { closeModal(); onOk(); });
}
function promptModal(title, label, placeholder, okLabel, onOk){
  openModal(`
    <h2>${esc(title)}</h2>
    <div class="field"><label>${esc(label)}</label>
      <input type="text" id="pmv" placeholder="${esc(placeholder)}" autocomplete="off"></div>
    <div class="btnrow">
      <button class="btn plain" onclick="closeModal()">Cancel</button>
      <button class="btn" id="ok">${esc(okLabel)}</button>
    </div>`,
    () => {
      const inp = document.getElementById("pmv");
      inp.focus();
      const submit = () => { const v = inp.value.trim(); if (!v) return; closeModal(); onOk(v); };
      document.getElementById("ok").onclick = submit;
      inp.addEventListener("keydown", e => { if (e.key === "Enter") submit(); });
    });
}

/* ============================== render root ============================== */
function render(){
  const app = document.getElementById("app");
  if (route.view === "home") app.innerHTML = vHome();
  else if (route.view === "folder") app.innerHTML = vFolder();
  else if (route.view === "deck") app.innerHTML = vDeck();
  else if (route.view === "editList") app.innerHTML = vEditList();
  else if (route.view === "study") app.innerHTML = vStudy();
  else if (route.view === "summary") app.innerHTML = vSummary();
  else if (route.view === "deckSummary") app.innerHTML = vDeckSummary();
}

/* ============================== backup / restore ============================== */
function dbCounts(folders){
  let decks = 0, cards = 0;
  for (const f of folders){ decks += f.decks.length; for (const d of f.decks) cards += d.cards.length; }
  return { folders: folders.length, decks, cards };
}
function exportBackup(){
  const payload = {
    app: "flashcards", version: 1,
    exportedAt: new Date().toISOString(),
    folders: db.folders
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `flashcards-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(a.href), 2000);
}
function pickRestoreFile(){
  const inp = document.getElementById("restorefile");
  inp.value = ""; inp.click();
}
function handleRestoreFile(e){
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = ev => {
    let data;
    try{ data = JSON.parse(ev.target.result); }
    catch(err){ openModal(`<h2>Restore failed</h2><p class="hint">That file isn’t a valid backup (couldn’t read it as JSON).</p><button class="btn" onclick="closeModal()">OK</button>`); return; }
    const folders = normalizeBackup(data);
    if (!folders){
      openModal(`<h2>Restore failed</h2><p class="hint">That file doesn’t look like a Flashcards backup. Pick a file created with the Export button.</p><button class="btn" onclick="closeModal()">OK</button>`);
      return;
    }
    const nw = dbCounts(folders), cur = dbCounts(db.folders);
    const pl = (n, w) => `${n} ${w}${n === 1 ? "" : "s"}`;
    confirmModal(
      "Restore backup?",
      `The backup has ${pl(nw.folders,"folder")}, ${pl(nw.decks,"deck")}, and ${pl(nw.cards,"question")}. ` +
      (cur.cards || cur.folders
        ? `It will REPLACE everything currently in the app (${pl(cur.folders,"folder")}, ${pl(cur.decks,"deck")}, ${pl(cur.cards,"question")}).`
        : `The app is currently empty, so nothing will be lost.`),
      "Restore",
      () => { db = { folders }; save(); render(); }
    );
  };
  r.readAsText(file);
}
function normalizeBackup(data){
  const src = data && Array.isArray(data.folders) ? data.folders
            : Array.isArray(data) ? data : null;
  if (!src) return null;
  const folders = [];
  for (const f of src){
    if (!f || typeof f.name !== "string" || !Array.isArray(f.decks)) return null;
    const decks = [];
    for (const d of f.decks){
      if (!d || typeof d.name !== "string" || !Array.isArray(d.cards)) return null;
      const cards = [];
      for (const c of d.cards){
        if (!c || typeof c.q !== "string" || typeof c.a !== "string") return null;
        cards.push({
          id: typeof c.id === "string" ? c.id : uid(),
          num: String(c.num ?? ""),
          q: c.q, a: c.a,
          memorized: c.memorized === true,
          needsPractice: c.needsPractice === true,
          test: c.test === "right" || c.test === "wrong" ? c.test : null
        });
      }
      decks.push({ id: typeof d.id === "string" ? d.id : uid(), name: d.name, cards });
    }
    folders.push({ id: typeof f.id === "string" ? f.id : uid(), name: f.name, decks });
  }
  return folders;
}

function selectAll(){

  if (selSet.size === d.cards.length) selSet.clear();
  else d.cards.forEach(c => selSet.add(c.id));

function openImport(){
  pendingRows = null;
  openModal(importHTML(), wireImport);
}
function importHTML(tab){
  tab = tab || "file";
  return `
    <h2>Import Questions</h2>
    <p class="hint">Use a spreadsheet with three columns: <b>#</b>, <b>Question</b>, <b>Answer</b>. A header row is detected automatically. Excel (.xlsx), CSV, and TSV files work — or paste cells straight from your spreadsheet.</p>
    <div class="tabbar">
      <button id="tab-file" class="${tab==="file"?"on":""}">📄 File</button>
      <button id="tab-paste" class="${tab==="paste"?"on":""}">📋 Paste</button>
    </div>
    <div id="imp-body">
      ${tab==="file" ? `
        <label class="filebtn">📄 Choose a file (.xlsx / .csv / .tsv)
          <input type="file" id="impfile" accept=".xlsx,.xls,.csv,.tsv,.txt" style="display:none">
        </label>` : `
        <div class="field"><label>Paste rows (copy cells from Excel / Google Sheets / Numbers)</label>
          <textarea id="imppaste" style="min-height:120px" placeholder="1&#9;What is 2+2?&#9;4&#10;2&#9;Capital of France?&#9;Paris"></textarea></div>
        <button class="btn soft" id="parsepaste">Preview</button>`}
    </div>
    <div id="imp-result"></div>`;
}
function wireImport(){
  document.getElementById("tab-file").onclick = () => { openModal(importHTML("file"), wireImport); };
  document.getElementById("tab-paste").onclick = () => { openModal(importHTML("paste"), wireImport); };
  const fi = document.getElementById("impfile");
  if (fi) fi.addEventListener("change", handleImportFile);
  const pp = document.getElementById("parsepaste");
  if (pp) pp.onclick = () => {
    const t = document.getElementById("imppaste").value;
    showImportPreview(parseDelimited(t));
  };
}
function handleImportFile(e){
  const file = e.target.files[0];
  if (!file) return;
  const name = file.name.toLowerCase();
  if (name.endsWith(".xlsx") || name.endsWith(".xls")){
    if (window.__noxlsx || typeof XLSX === "undefined"){
      showImportError("Excel support needs an internet connection the first time. You can also save your sheet as CSV and import that.");
      return;
    }
    const r = new FileReader();
    r.onload = ev => {
      try{
        const wb = XLSX.read(ev.target.result, { type:"array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:"" });
        showImportPreview(normalizeRows(rows));
      }catch(err){ showImportError("Couldn’t read that Excel file. Try saving it as CSV."); }
    };
    r.readAsArrayBuffer(file);
  } else {
    const r = new FileReader();
    r.onload = ev => showImportPreview(parseDelimited(ev.target.result));
    r.readAsText(file);
  }
}
/* CSV/TSV parser (handles quoted fields) */
function parseDelimited(text){
  text = String(text || "").replace(/^﻿/, "");
  if (!text.trim()) return [];
  const firstLine = text.slice(0, text.indexOf("\n") < 0 ? text.length : text.indexOf("\n"));
  const delim = firstLine.includes("\t") ? "\t" : ",";
  const rows = []; let row = [], cell = "", inQ = false;
  for (let i = 0; i < text.length; i++){
    const ch = text[i];
    if (inQ){
      if (ch === '"'){ if (text[i+1] === '"'){ cell += '"'; i++; } else inQ = false; }
      else cell += ch;
    } else if (ch === '"') inQ = true;
    else if (ch === delim){ row.push(cell); cell = ""; }
    else if (ch === "\n" || ch === "\r"){
      if (ch === "\r" && text[i+1] === "\n") i++;
      row.push(cell); rows.push(row); row = []; cell = "";
    } else cell += ch;
  }
  row.push(cell); rows.push(row);
  return normalizeRows(rows);
}
function normalizeRows(rows){
  const out = [];
  for (const r of rows){
    if (!r || !r.length) continue;
    const cells = r.map(x => String(x ?? "").trim());
    if (cells.every(x => !x)) continue;
    let num, q, a;
    if (cells.length >= 3){ [num, q, a] = cells; }
    else if (cells.length === 2){ num = ""; [q, a] = cells; }
    else continue;
    out.push({ num, q, a });
  }
  // drop header row like "# | Question | Answer"
  if (out.length){
    const h = out[0];
    const hq = h.q.toLowerCase(), ha = h.a.toLowerCase(), hn = h.num.toLowerCase();
    if (hq.includes("question") || ha.includes("answer") || hn === "#" || hn === "no" || hn === "number") out.shift();
  }
  return out.filter(r => r.q && r.a);
}
function showImportError(msg){
  document.getElementById("imp-result").innerHTML = `<div class="err">${esc(msg)}</div>`;
}
function showImportPreview(rows){
  pendingRows = rows;
  const box = document.getElementById("imp-result");
  if (!rows.length){
    box.innerHTML = `<div class="err">No questions found. Check that rows have a Question and an Answer column.</div>`;
    return;
  }
  const pv = rows.slice(0,3).map(r => `
    <div class="pv"><div class="pvq">${esc(r.num ? r.num + ". " : "")}${esc(r.q)}</div>
    <div class="pva">${esc(r.a)}</div></div>`).join("");
  box.innerHTML = `
    <div class="preview">${pv}${rows.length>3?`<div class="pv pva">…and ${rows.length-3} more</div>`:""}</div>
    <button class="btn" id="doimp">Import ${rows.length} ${rows.length===1?"Question":"Questions"}</button>`;
  document.getElementById("doimp").onclick = doImport;
}
function doImport(){
  const d = deckById(route.fid, route.did);
  let n = nextNum(d);
  for (const r of pendingRows){
    d.cards.push({ id:uid(), num: r.num || String(n), q:r.q, a:r.a, memorized:false, needsPractice:false, test:null });
    n++;
  }
  save(); closeModal(); render();
}

/* ============================== study ============================== */
const MODE_NAMES = { practice:"Practice", blank:"Fill In The Blank", test:"Test" };
function startStudy(mode){
  const d = deckById(route.fid, route.did);
  if (!d || !d.cards.length) return;
  const filter = deckFilter(d.id);
  const ids = d.cards.filter(filterPred(filter)).map(c => c.id);
  if (!ids.length) return;
  study = { fid:route.fid, did:route.did, mode, ids, filter, i:0, flipped:false, reveal:false, done:false };
  go({ view:"study", fid:route.fid, did:route.did });
}
function practiceFrom(cid){
  const d = deckById(route.fid, route.did);
  if (!d) return;
  let filter = deckFilter(d.id);
  let ids = d.cards.filter(filterPred(filter)).map(c => c.id);
  if (!ids.includes(cid)){ filter = "all"; ids = d.cards.map(c => c.id); }
  study = { fid:route.fid, did:route.did, mode:"practice", ids, filter,
            i: ids.indexOf(cid), flipped:false, reveal:false, done:false };
  go({ view:"study", fid:route.fid, did:route.did });
}
function curCard(){
  const d = deckById(study.fid, study.did);
  return d && d.cards.find(x => x.id === study.ids[study.i]);
}
function exitStudy(){ const s = study; study = null; go({ view:"deck", fid:s.fid, did:s.did }); }
function flipCard(){ study.flipped = true; study.reveal = false; render(); }
function toggleFlip(){ study.flipped = !study.flipped; study.reveal = false; render(); }
function toggleReveal(){ study.reveal = !study.reveal; render(); }
function nextCard(){
  if (study.i >= study.ids.length - 1){ study.done = true; }
  else { study.i++; study.flipped = false; study.reveal = false; }
  render();
}
function prevCard(){
  study.i = (study.i - 1 + study.ids.length) % study.ids.length;
  study.flipped = false; study.reveal = false; render();
}
function restartStudy(){ study.i = 0; study.flipped = false; study.reveal = false; study.done = false; render(); }
function toggleComplete(){
  const c = curCard();
  c.memorized = !c.memorized;
  if (!c.memorized) c.needsPractice = false;
  save(); render();
}
function toggleNP(){
  const c = curCard();
  c.needsPractice = !c.needsPractice;
  save(); render();
}
function markTest(res){
  const c = curCard();
  c.test = (c.test === res) ? null : res;
  save(); render();
  if (c.test !== null) setTimeout(() => { if (study && !study.done) nextCard(); }, 350);
}

const svgCheck = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 12.5l5 5 10-11"/></svg>`;
const svgX = `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>`;

function vStudy(){
  if (!study) return vHome();
  const d = deckById(study.fid, study.did);
  if (!d || !study.ids.length){ study = null; return vDeck(); }
  const npFilter = study.filter === "np";
  const filtered = study.filter !== "all";
  const hdr = `
    <div class="hdr">
      <button class="iconbtn backbtn" onclick="exitStudy()" aria-label="Exit">‹</button>
      <h1>${esc(d.name)}<span class="sub">${MODE_NAMES[study.mode]}${filtered ? ` · ${FILTER_NAMES[study.filter]} only` : ""}</span></h1>
      <span class="modechip${npFilter ? " np" : ""}">${npFilter ? "⚠ " : ""}${filtered ? FILTER_NAMES[study.filter] : MODE_NAMES[study.mode]}</span>
    </div>`;

  if (study.done){
    const s = deckStats(d);
    const line = (study.mode === "test"
      ? `${s.right} right · ${s.wrong} wrong · ${s.untested} unanswered`
      : `${s.mem} of ${s.total} marked Complete`)
      + (filtered ? ` · studied ${study.ids.length} (${FILTER_NAMES[study.filter].toLowerCase()})` : "");
    return `${hdr}
      <div class="content"><div class="doneScreen fadein">
        <span class="big">🎉</span>
        <h2>Deck finished!</h2>
        <p>${line}</p>
        <button class="btn" onclick="restartStudy()">↻ Start Over</button>
        <button class="btn soft" onclick="go({view:'deckSummary',fid:'${study.fid}',did:'${study.did}',from:'deck'})" style="max-width:320px">📊 View Summary</button>
        <button class="btn plain" onclick="exitStudy()" style="max-width:320px">Back to Deck</button>
      </div></div>`;
  }

  const c = curCard();
  if (!c){ study = null; return vDeck(); }
  const pct = Math.round(((study.i + 1) / study.ids.length) * 100);
  const progress = `
    <div class="progress">
      <span>${study.i + 1} / ${study.ids.length}</span>
      <div class="pbar"><i style="width:${pct}%"></i></div>
    </div>`;

  const qCard = `
    <div class="fcard fadein tappable" onclick="toggleFlip()">
      <div class="flabel">Question ${esc(c.num)}${study.flipped ? " · tap to hide answer" : " · tap to flip"}</div>
      <div class="ftext">${esc(c.q)}</div>
    </div>`;

  let ansCard = "", controls = "";
  const completeBtn = `
    <button class="btn completebtn ${c.memorized?"on":""}" onclick="toggleComplete()">
      ${c.memorized ? "✓ Completed — tap to unmark" : "Mark as Complete"}
    </button>`;
  const npBtn = `
    <button class="btn npbtn ${c.needsPractice?"on":""}" onclick="toggleNP()">
      ${c.needsPractice ? "⚠ Needs practice — tap to clear" : "Not 100% confident — needs practice"}
    </button>`;

  if (!study.flipped){
    controls = `<button class="btn" onclick="flipCard()" style="padding:18px;font-size:18px">Flip ↻</button>`;
  } else if (study.mode === "practice"){
    ansCard = `<div class="fcard ans fadein tappable" onclick="toggleFlip()"><div class="flabel">Answer · tap to hide</div><div class="fanswer">${esc(c.a)}</div></div>`;
    controls = completeBtn + (c.memorized ? npBtn : "");
  } else if (study.mode === "blank"){
    const words = c.a.split(/\s+/).filter(Boolean);
    const first = words.slice(0,4), rest = words.slice(4);
    const restHtml = rest.map(w =>
      study.reveal ? esc(w) : `<span class="blank">${esc(w)}</span>`).join(" ");
    ansCard = `
      <div class="fcard ans fadein tappable" ${rest.length ? `onclick="toggleReveal()"` : `onclick="toggleFlip()"`}>
        <div class="flabel">Answer — first 4 words${rest.length ? (study.reveal ? " · tap to hide the rest" : " · tap to show the rest") : ""}</div>
        <div class="fanswer">${esc(first.join(" "))}${rest.length ? " " + restHtml : ""}</div>
        ${rest.length === 0 ? `<div class="hint" style="color:var(--muted);font-size:13.5px">This answer has 4 words or fewer, so it’s fully shown.</div>` : ""}
      </div>`;
    controls = `
      ${rest.length ? `<button class="btn soft" onclick="toggleReveal()">${study.reveal ? "Hide the rest" : "Show the rest"}</button>` : ""}
      ${completeBtn}${c.memorized ? npBtn : ""}`;
  } else { // test
    ansCard = study.reveal
      ? `<div class="fcard ans fadein"><div class="flabel">Answer</div><div class="fanswer">${esc(c.a)}</div></div>`
      : `<div class="hiddenbox fadein">🙈 Answer hidden — say it out loud, then check yourself.</div>`;
    controls = `
      <button class="btn soft" onclick="toggleReveal()">${study.reveal ? "Hide answer" : "Show answer"}</button>
      <div class="markrow">
        <div class="markwrap">
          <button class="markbtn right ${c.test==="right"?"sel":""}" onclick="markTest('right')" aria-label="Mark right">${svgCheck}</button>
          Right
        </div>
        <div class="markwrap">
          <button class="markbtn wrong ${c.test==="wrong"?"sel":""}" onclick="markTest('wrong')" aria-label="Mark wrong">${svgX}</button>
          Wrong
        </div>
      </div>
      ${npBtn}`;
  }

  return `${hdr}
    <div class="content study">
      ${progress}
      ${qCard}
      ${ansCard}
      <div class="studyctl">
        ${controls}
        <div class="navrow">
          <button class="navbtn" onclick="prevCard()" aria-label="Previous">‹</button>
          ${study.flipped ? "" : `<div style="flex:1"></div>`}
          ${study.flipped ? `<button class="btn plain" onclick="nextCard()">Next ›</button>` : ""}
          ${study.flipped ? "" : `<button class="navbtn" onclick="nextCard()" aria-label="Next">›</button>`}
        </div>
      </div>
    </div>`;
}

/* ============================== summary ============================== */
function vSummary(){
  const allDecks = [];
  for (const f of db.folders) for (const d of f.decks) allDecks.push({ f, d, s: deckStats(d) });
  const tot = allDecks.reduce((acc,x) => {
    acc.total += x.s.total; acc.mem += x.s.mem; acc.right += x.s.right; acc.wrong += x.s.wrong; return acc;
  }, { total:0, mem:0, right:0, wrong:0 });

  let body;
  if (!tot.total){
    body = `<div class="empty"><span class="big">📊</span>Nothing to summarize yet.<br>Add some questions and start studying!</div>`;
  } else {
    const groups = db.folders.filter(f => f.decks.length).map(f => `
      <div class="section-title">📁 ${esc(f.name)}</div>
      <div class="rowlist">
        ${f.decks.map(d => {
          const s = deckStats(d);
          return `
          <div class="row" onclick="go({view:'deckSummary',fid:'${f.id}',did:'${d.id}',from:'summary'})" role="button">
            <div class="rmain">
              <div class="rtitle">${esc(d.name)}</div>
              <div class="sumbar">
                ${s.total ? `
                <i style="width:${(s.mem/s.total)*100}%;background:var(--green)"></i>
                <i style="width:${((s.total-s.mem)/s.total)*100}%;background:var(--line)"></i>` : ""}
              </div>
              <div class="rsub">🧠 ${s.mem}/${s.total} memorized · ✓ ${s.right} right · ✗ ${s.wrong} wrong${s.np ? ` · ⚠ ${s.np} needs practice` : ""}</div>
            </div>
            <span class="chev">›</span>
          </div>`;}).join("")}
      </div>`).join("");
    body = `
      <div class="statgrid">
        <div class="stat g"><div class="n">${tot.mem}</div><div class="l">Memorized</div></div>
        <div class="stat a"><div class="n">${tot.total - tot.mem}</div><div class="l">Still learning</div></div>
        <div class="stat g"><div class="n">${tot.right}</div><div class="l">Test: right</div></div>
        <div class="stat r"><div class="n">${tot.wrong}</div><div class="l">Test: wrong</div></div>
      </div>
      ${groups}`;
  }
  return `
    <div class="hdr">
      <button class="iconbtn backbtn" onclick="go({view:'home'})" aria-label="Back">‹</button>
      <h1>📊 Summary</h1>
    </div>
    <div class="content">${body}</div>`;
}

function vDeckSummary(){
  const f = folderById(route.fid), d = deckById(route.fid, route.did);
  if (!d) return vSummary();
  const s = deckStats(d);
  const back = route.from === "summary"
    ? `go({view:'summary'})` : `go({view:'deck',fid:'${route.fid}',did:'${route.did}'})`;

  const item = (c, chips) => `
    <div class="row qrow" style="cursor:default">
      <div class="qnum">${esc(c.num)}</div>
      <div class="qtext">
        <div class="qq">${esc(c.q)}</div>
        <div class="qa">${esc(c.a)}</div>
        <div class="chips">${chips}</div>
      </div>
    </div>`;
  const list = (cards, chipFn, emptyMsg) => cards.length
    ? `<div class="rowlist">${cards.map(c => item(c, chipFn(c))).join("")}</div>`
    : `<div class="empty" style="padding:18px">${emptyMsg}</div>`;

  const mem = d.cards.filter(c => c.memorized);
  const notMem = d.cards.filter(c => !c.memorized);
  const right = d.cards.filter(c => c.test === "right");
  const wrong = d.cards.filter(c => c.test === "wrong");
  const untested = d.cards.filter(c => !c.test);

  return `
    <div class="hdr">
      <button class="iconbtn backbtn" onclick="${back}" aria-label="Back">‹</button>
      <h1>${esc(d.name)}<span class="sub">${esc(f.name)} · Summary</span></h1>
    </div>
    <div class="content">
      <div class="statgrid">
        <div class="stat g"><div class="n">${s.mem}</div><div class="l">Memorized</div></div>
        <div class="stat a"><div class="n">${s.notMem}</div><div class="l">Still learning</div></div>
        <div class="stat g"><div class="n">${s.right}</div><div class="l">Test: right</div></div>
        <div class="stat r"><div class="n">${s.wrong}</div><div class="l">Test: wrong</div></div>
      </div>

      <div class="section-title">🧠 Memorization</div>
      <div class="sumbar">
        <i style="width:${s.total?(s.mem/s.total)*100:0}%;background:var(--green)"></i>
        <i style="width:${s.total?(s.notMem/s.total)*100:0}%;background:var(--line)"></i>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--green)"></span>Memorized (${s.mem})</span>
        <span><span class="dot" style="background:#c9cdda"></span>Not yet (${s.notMem})</span>
      </div>
      <div class="section-title">Memorized</div>
      ${list(mem, () => `<span class="chip mem">✓ Memorized</span>`, "Nothing memorized yet — you’ll get there!")}
      <div class="section-title">Not memorized yet</div>
      ${list(notMem, () => `<span class="chip pend">Still learning</span>`, "Everything is memorized. 🎉")}
      <div class="section-title">⚠ Needs practice</div>
      ${list(d.cards.filter(c => c.needsPractice), () => `<span class="chip np">⚠ Needs Practice</span>`, "Nothing is marked as needing practice.")}

      <div class="section-title" style="margin-top:26px">🎯 Test results</div>
      <div class="sumbar">
        <i style="width:${s.total?(s.right/s.total)*100:0}%;background:var(--green)"></i>
        <i style="width:${s.total?(s.wrong/s.total)*100:0}%;background:var(--red)"></i>
        <i style="width:${s.total?(s.untested/s.total)*100:0}%;background:transparent"></i>
      </div>
      <div class="legend">
        <span><span class="dot" style="background:var(--green)"></span>Right (${s.right})</span>
        <span><span class="dot" style="background:var(--red)"></span>Wrong (${s.wrong})</span>
        <span><span class="dot" style="background:#c9cdda"></span>Untested (${s.untested})</span>
      </div>
      <div class="section-title">Right</div>
      ${list(right, () => `<span class="chip right">✓ Right</span>`, "No right answers recorded yet.")}
      <div class="section-title">Wrong</div>
      ${list(wrong, () => `<span class="chip wrong">✗ Wrong</span>`, "No wrong answers recorded.")}
      ${untested.length ? `<div class="section-title">Not tested yet</div>
      ${list(untested, () => `<span class="chip pend">Untested</span>`, "")}` : ""}

      <div class="btnrow" style="margin-top:22px">
        <button class="btn plain" onclick="resetDeck('memorized')">Reset memorized</button>
        <button class="btn plain" onclick="resetDeck('test')">Reset test results</button>
      </div>
    </div>`;
}
function resetDeck(kind){
  const d = deckById(route.fid, route.did);
  const label = kind === "test" ? "test results" : "memorized marks";
  confirmModal(`Reset ${label}?`, `All ${label} in “${d.name}” will be cleared.`, "Reset", () => {
    for (const c of d.cards){ if (kind === "test") c.test = null; else { c.memorized = false; c.needsPractice = false; } }
    save(); render();
  });
}

render();
</script>
</body>
</html>
