<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f6f7fb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>NC27 Mukhpath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" onerror="window.__noxlsx=true"></script>
<style>
  :root{
    --bg:#f6f7fb; --card:#ffffff; --ink:#1c2130; --muted:#6b7280;
    --line:#e5e7ef; --accent:#4f46e5; --accent-soft:#eef0fe;
    --green:#16a34a; --green-soft:#e7f6ec; --red:#dc2626; --red-soft:#fdecec;
    --amber:#b45309; --amber-soft:#fdf3e3;
    --radius:16px; --shadow:0 1px 3px rgba(28,33,48,.08),0 4px 14px rgba(28,33,48,.05);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Atkinson Hyperlegible",-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    font-size:17px; line-height:1.5;
    padding-bottom:env(safe-area-inset-bottom);
  }
  #app{max-width:640px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  /* ---------- header ---------- */
  .hdr{
    position:sticky;top:0;z-index:20;background:rgba(246,247,251,.94);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:flex;align-items:center;gap:8px;
    padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
    border-bottom:1px solid var(--line);
  }
  .hdr h1{font-size:20px;margin:0;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:700}
  .hdr .sub{display:block;font-size:12.5px;color:var(--muted);font-weight:400;line-height:1.2}
  .iconbtn{
    border:none;background:none;color:var(--accent);font:inherit;font-weight:700;
    padding:8px 10px;border-radius:10px;cursor:pointer;flex-shrink:0;
    display:inline-flex;align-items:center;gap:6px;font-size:15.5px;
  }
  .iconbtn:active{background:var(--accent-soft)}
  .backbtn{margin-left:-8px;font-size:24px;line-height:1;padding:6px 10px}

  .content{padding:16px 14px 32px;flex:1;display:flex;flex-direction:column}
  .section-title{font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:18px 4px 8px}

  /* ---------- list rows ---------- */
  .rowlist{display:flex;flex-direction:column;gap:10px}
  .row{
    background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
    display:flex;align-items:center;gap:12px;padding:14px;
    border:1px solid transparent;cursor:pointer;text-align:left;width:100%;font:inherit;color:inherit;
  }
  .row:active{border-color:var(--accent)}
  .row .emoji{font-size:24px;flex-shrink:0;width:44px;height:44px;display:flex;align-items:center;justify-content:center;background:var(--accent-soft);border-radius:12px}
  .row .rmain{flex:1;min-width:0}
  .row .rtitle{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .rsub{font-size:14px;color:var(--muted)}
  .row .chev{color:#c3c7d4;font-size:20px;flex-shrink:0}
  .trash{
    border:none;background:none;color:#a6abbd;font-size:19px;padding:10px;cursor:pointer;
    border-radius:10px;flex-shrink:0;line-height:1;
  }
  .trash:active{color:var(--red);background:var(--red-soft)}

  /* question rows */
  .qrow{align-items:flex-start;cursor:pointer}
  .qnum{
    flex-shrink:0;min-width:34px;height:34px;border-radius:10px;background:var(--bg);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:var(--muted);
    padding:0 6px;
  }
  .qtext{flex:1;min-width:0}
  .qq{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;font-weight:700;font-size:15.5px}
  .qa{display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;color:var(--muted);font-size:14px;margin-top:2px}
  .chips{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
  .chip{font-size:12px;font-weight:700;padding:2px 9px;border-radius:999px}
  .chip.mem{background:var(--green-soft);color:var(--green)}
  .chip.right{background:var(--green-soft);color:var(--green)}
  .chip.wrong{background:var(--red-soft);color:var(--red)}
  .chip.pend{background:var(--bg);color:var(--muted)}
  .selbox{
    flex-shrink:0;width:26px;height:26px;border-radius:8px;border:2px solid #c3c7d4;margin-top:4px;
    display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700;
  }
  .selbox.on{background:var(--accent);border-color:var(--accent)}

  /* ---------- buttons ---------- */
  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    border:none;border-radius:14px;padding:15px 18px;font:inherit;font-weight:700;font-size:16.5px;
    cursor:pointer;color:#fff;background:var(--accent);
  }
  .btn:active{filter:brightness(.92)}
  .btn.ghost{background:var(--card);color:var(--accent);border:1.5px dashed #c7cbf5;box-shadow:none}
  .btn.soft{background:var(--accent-soft);color:var(--accent)}
  .btn.warn{background:var(--red);color:#fff}
  .btn.plain{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .btn.sm{padding:10px 14px;font-size:14.5px;border-radius:11px;width:auto}
  .btnrow{display:flex;gap:10px}
  .btnrow .btn{flex:1}

  .empty{
    text-align:center;color:var(--muted);padding:44px 20px;font-size:15.5px;
  }
  .empty .big{font-size:44px;display:block;margin-bottom:10px}

  /* ---------- study modes ---------- */
  .study{display:flex;flex-direction:column;flex:1;gap:14px}
  .progress{display:flex;align-items:center;gap:10px;font-size:14px;color:var(--muted);font-weight:700}
  .pbar{flex:1;height:6px;background:var(--line);border-radius:99px;overflow:hidden}
  .pbar i{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .25s}
  .modechip{font-size:12px;font-weight:700;background:var(--accent-soft);color:var(--accent);padding:3px 10px;border-radius:999px;white-space:nowrap}

  .fcard{
    background:var(--card);border-radius:20px;box-shadow:var(--shadow);
    padding:22px 20px;display:flex;flex-direction:column;gap:14px;min-height:180px;
  }
  .flabel{font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .ftext{font-size:20px;font-weight:700;line-height:1.45;overflow-wrap:anywhere}
  .fanswer{font-size:18.5px;line-height:1.55;overflow-wrap:anywhere}
  .fcard.ans{border:1.5px solid #dfe2f9;background:#fbfbff}
  .tappable{cursor:pointer;user-select:none;-webkit-user-select:none}
  .tappable:active{transform:scale(.99)}
  .hiddenbox{
    background:var(--bg);border:1.5px dashed #c9cdda;border-radius:12px;color:var(--muted);
    text-align:center;padding:26px 14px;font-size:15.5px;
  }
  .blank{
    background:#e4e6f2;border-radius:5px;color:transparent;user-select:none;
  }
  .studyctl{margin-top:auto;display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
  .navrow{display:flex;align-items:center;gap:10px}
  .navbtn{
    flex-shrink:0;width:54px;height:54px;border-radius:14px;border:none;background:var(--card);
    box-shadow:var(--shadow);font-size:22px;color:var(--ink);cursor:pointer;
  }
  .navbtn:disabled{opacity:.35}
  .navrow .btn{flex:1}

  .completebtn{background:var(--card);color:var(--green);border:1.5px solid var(--green);box-shadow:none}
  .completebtn.on{background:var(--green);color:#fff;border-color:var(--green)}
  .npbtn{background:var(--card);color:var(--amber);border:1.5px solid #ecd7ae;box-shadow:none;font-size:15px}
  .npbtn.on{background:var(--amber-soft);border-color:var(--amber)}
  .chip.np{background:var(--amber-soft);color:var(--amber)}
  .modechip.np{background:var(--amber-soft);color:var(--amber)}
  .seg{display:flex;background:#e9ebf3;border-radius:13px;padding:4px;gap:4px;margin-bottom:10px}
  .seg button{flex:1;border:none;background:none;font:inherit;font-weight:700;font-size:12.5px;line-height:1.25;padding:8px 4px;border-radius:10px;color:var(--muted);cursor:pointer}
  .seg button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .seg button.npseg.on{color:var(--amber)}
  .seg button.dis{opacity:.45}

  .markrow{display:flex;justify-content:center;gap:34px;padding:4px 0}
  .markwrap{display:flex;flex-direction:column;align-items:center;gap:6px;font-size:13.5px;font-weight:700;color:var(--muted)}
  .markbtn{
    width:66px;height:66px;border-radius:50%;border:none;cursor:pointer;color:#fff;
    display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow);
  }
  .markbtn svg{width:30px;height:30px}
  .markbtn.right{background:var(--green)}
  .markbtn.wrong{background:var(--red)}
  .markbtn.sel{outline:4px solid rgba(28,33,48,.18);outline-offset:2px}
  .markbtn:active{filter:brightness(.9)}

  .doneScreen{text-align:center;padding:40px 16px;display:flex;flex-direction:column;gap:8px;align-items:center}
  .doneScreen .big{font-size:52px}
  .doneScreen h2{margin:4px 0 2px}
  .doneScreen p{color:var(--muted);margin:0 0 16px}
  .doneScreen .btn{max-width:320px}

  /* ---------- summary ---------- */
  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
  .stat{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:12px 14px}
  .stat .n{font-size:24px;font-weight:700;line-height:1.15}
  .stat .l{font-size:13px;color:var(--muted);font-weight:700}
  .stat.g .n{color:var(--green)} .stat.r .n{color:var(--red)} .stat.a .n{color:var(--amber)}
  .sumbar{display:flex;height:10px;border-radius:99px;overflow:hidden;background:var(--line);margin:8px 0 2px}
  .sumbar i{display:block;height:100%}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:13px;color:var(--muted);font-weight:700;margin-top:6px}
  .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}

  /* ---------- modal ---------- */
  .overlay{
    position:fixed;inset:0;background:rgba(20,24,38,.45);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
  }
  @media(min-width:520px){.overlay{align-items:center}}
  .sheet{
    background:var(--card);width:100%;max-width:520px;border-radius:22px 22px 0 0;
    padding:20px 18px calc(20px + env(safe-area-inset-bottom));
    max-height:88vh;overflow:auto;
  }
  @media(min-width:520px){.sheet{border-radius:22px}}
  .sheet h2{margin:0 0 4px;font-size:19px}
  .sheet .hint{color:var(--muted);font-size:14px;margin:0 0 14px}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:13.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .field input[type=text],.field textarea{
    width:100%;border:1.5px solid var(--line);border-radius:12px;padding:12px;font:inherit;font-size:16px;
    background:var(--bg);color:var(--ink);
  }
  .field textarea{min-height:84px;resize:vertical}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--accent);background:#fff}
  .tabbar{display:flex;background:var(--bg);border-radius:12px;padding:4px;gap:4px;margin-bottom:14px}
  .tabbar button{
    flex:1;border:none;background:none;font:inherit;font-weight:700;font-size:14.5px;padding:9px;border-radius:9px;
    color:var(--muted);cursor:pointer;
  }
  .tabbar button.on{background:var(--card);color:var(--ink);box-shadow:var(--shadow)}
  .filebtn{
    display:flex;align-items:center;justify-content:center;gap:8px;border:1.5px dashed #c7cbf5;border-radius:14px;
    padding:22px;color:var(--accent);font-weight:700;cursor:pointer;background:var(--accent-soft);
  }
  .preview{background:var(--bg);border-radius:12px;padding:12px;margin:12px 0;font-size:14px}
  .preview .pv{padding:7px 0;border-bottom:1px solid var(--line)}
  .preview .pv:last-child{border-bottom:none}
  .preview .pvq{font-weight:700}
  .preview .pva{color:var(--muted)}
  .err{color:var(--red);font-size:14px;font-weight:700;margin:8px 0}

  /* select-mode action bar */
  .selbar{
    position:sticky;bottom:0;z-index:15;background:var(--card);border-top:1px solid var(--line);
    padding:12px 14px calc(12px + env(safe-area-inset-bottom));display:flex;gap:10px;
    margin:auto -14px 0;box-shadow:0 -4px 14px rgba(28,33,48,.06);
  }
  .selbar .btn{flex:1}
  .fadein{animation:fi .18s ease}
  @keyframes fi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>

<script>
"use strict";
/* ============================== data ============================== */
const LS = "flashcards.nc27.v1";
const SEED = {"folders":[{"id":"f-english","name":"English","decks":[{"id":"d-english-qa","name":"Q & A","cards":[{"id":"c-english-qa-1","num":"1","q":"What is Upasana?","a":"'Swami' refers to Aksharbrahman Gunatitanand Swami, and 'Narayan' refers to Parabrahman Purushottam Sahajanand Swami. Upasana means becoming aksharrup (brahmarup) and offering devotion to Purushottam with the relationship and spirit of master and servant (Swami-Sevak bhav).","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-2","num":"2","q":"How should we understand Parabrahma's swarup?","a":"Bhagwan Swaminarayan is Sarvopari (Supreme), Divya Sakar (has an eternally divine form), Sarva-Karta (the All-Doer), and Pragat (Present today on Earth through the Ekantik Satpurush)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-3","num":"3","q":"What is the meaning of Akshar Purushottam?","a":"Akshar is Gunatitanand Swami, Purushottam is Sahajanand Swami. We should have devotion towards Purushottam by becoming pure like Gunatitanand Swami.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-4","num":"4","q":"Which are the five eternal entities?","a":"Jiva (soul), ishwar (deities), maya (darkness/ignorance), Brahman and Parabrahman.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-5","num":"5","q":"If Bhagwan is sarvopari then what's the need for Aksharbrahma?","a":"Aksharbrahma is necessary because he serves as the divine abode of God, the ideal devotee for us to emulate, and the essential for the \"gateway to moksha\" through whom Bhagwan remains ever-present on Earth.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-6","num":"6","q":"What are the two things we need to attain Akshardham?","a":"Upasana and Agna are two ways to attain Akshardham.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-7","num":"7","q":"What is the purpose of mandirs?","a":"To preserve and cultivate Upasana and Bhakti, as well as to serve the ideal devotee, Akshar, along with Purushottam.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-8","num":"8","q":"What are the four forms of Aksharbrahma?","a":"1. He serves as the divine abode (Akshardham) 2. The personal servant in that abode 3. He is present in everything and everywhere. (Chidakash) 4. The manifest Guru on Earth","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-9","num":"9","q":"Why is the presence of the Pragat Satpurush necessary in our spiritual life, even when scriptures, murtis, and sacred pilgrimage places exist?","a":"The Role of the Pragat Satpurush: 1. To establish firm conviction in God 2. To help the jiva become brahmarup 3. To enable the experience of the bliss of the manifest God 4. To grant ultimate liberation (moksha)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-qa-10","num":"10","q":"Why is it necessary to become \"Brahmarup\"?","a":"To become Brahmarup means to become free from the influence of the three gunas –- sattva, rajas, and tamas –-and firmly identify as the ātmā, separate from the body, mind, ego, and worldly attachments. Only after becoming Brahmarup can one offer pure and the highest level of bhakti to Purushottam Bhagwan.","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-english-vachanamrut","name":"Vachanamrut","cards":[{"id":"c-english-vachanamrut-1","num":"1","q":"How is BAPS' darshan/philosophy unique from other Hindu darshans?","a":"From the Vedas, the Purāns, the Itihās and the Smrutis, I have formed the principle that jiva, māyā, ishwar, Brahma and Parabrahma are all eternal. (Gadhada Section III - 10)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-2","num":"2","q":"What is our Upasana?","a":"One should develop oneness with one's jivātmā and with that Brahma and worship Parabrahma while maintaining a master-servant relationship with Him. (Gadhada Section II - 3)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-3","num":"3","q":"Why is it important to understand Parabrahma's Swarup?","a":"The knowledge of God's form and the knowledge of God's greatness are the two extraordinary means to attain liberation. (Gadhada Section I - 57)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-4","num":"4","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sarvopari?","a":"It is that same supreme Purushottam Bhagwān who manifests on this earth out of compassion - for the purpose of granting liberation to the jivas. He is presently visible before everyone; He is your Ishtadev; and He accepts your service. (Gadhada Section III - 38)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-5","num":"5","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sakar and Divya?","a":"God, who possesses a definite form, forever resides in His luminous Akshardhām. (Gadhada Section III - 32)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-6","num":"6","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sarva Karta?","a":"I, Myself, have attentively listened to all of the scriptures which Vyāsji has written regarding the attainment of liberation. The main principle prevalent in all those scriptures and the only principle for the liberation of the jiva is simply this: The sole creator, sustainer and destroyer of this entire cosmos is God. (Gadhada Section II - 21)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-7","num":"7","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Pragat?","a":"When God incarnates for the purpose of granting liberation to the jivas, He is always accompanied by His Akshardhām, His attendants - who are formed of chaitanya - and all of His divine powers. (Gadhada Section I - 71)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-8","num":"8","q":"How should we worship Aksharbrahma?","a":"Such a Sant should not be thought of as a human being, nor should he be thought of as a deity, because such behavior is not possible for either humans or deities. Indeed, even though that Sant appears to be human, he is still worthy of being worshipped on par with God. (Gadhada Section III - 26)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-9","num":"9","q":"What are the benefits of the Aksharbrahma Guru?","a":"Intense love for the Satpurush is the only means to realizing one's ātmā; it is the only means to realizing the greatness of the Satpurush; and it is also the only means to having the direct realization of God. (Vartal 11)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-vachanamrut-10","num":"10","q":"How do we attain Ekantik Dharma?","a":"Bhāgwat dharma is upheld by maintaining profound love towards the Ekāntik Sant of God,who possesses the attributes of swadharma, gnān, vairāgya, and bhakti coupled with knowledge of God's greatness. Maintaining profound love towards such a Sant also opens the gateway to liberation. (Gadhada Section I - 54)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-english-swaminivto","name":"Swamini Vāto","cards":[{"id":"c-english-swaminivto-1","num":"1","q":"What's our the goal in life?","a":"We are born to accomplish two things. One, to become aksharrup -- in this, the body is a hindrance; and two, to join with God -- in this, company (of worldly people) is a hindrance in many ways. These two faults must be removed. (Prakaran 4 - Vāt 99)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-2","num":"2","q":"Why is it important to understand Parabrahma's Swarup?","a":"One who has resolute faith in God (that he will grant liberation) has completed all endeavours. He has nothing more left to do. (Prakaran 1 - Vāt 123)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-3","num":"3","q":"How should we please Swaminarayan Bhagwan?","a":"Three things really please God. First, following his wishes; second, understanding the Sadhu's form; and third, understanding the form of God. Such a person is to be truly, truly, truly commended. Therefore, adopt these three methods. (Prakaran 1 - Vāt 165)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-4","num":"4","q":"Why should we surrender ourselves to the Satpurush?","a":"If the great Sadhu casts even a slight glance, lust, etc. cannot harass. And, despite any amount of effort on one's own, lust, etc. will still overpower one. Therefore, take firm refuge at the feet of the great Sadhu. (Prakaran 5 - Vāt 250)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-5","num":"5","q":"How should we understand the greatness of Bhagwan and his Ekantik Sant?","a":"One should continuously engage in delivering and listening to talks on the glory of God and his Sadhu. Maharaj has come here (to earth) with his Akshardham, pārshads and all his powers. He is exactly the same (today). He whom we wish to attain after death, we have attained during this life; there is nothing more left to attain. If this truth is not understood properly, the jiva remains weak. (Prakaran 1 - Vāt 1)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-6","num":"6","q":"What is the true form of our atma?","a":"An aspirant engages in discourses, sings bhajans and talks about God, but does not believe, \"I am not this body.\" Therefore, 24 hours-a-day remember, \"I am not the body, but I am the ātmā, who lives in the body. I am brahman, akshar and within me Paramatma Parameshwar Purushottam himself is eternally present.\" (Prakaran 1 - Vāt 341)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-7","num":"7","q":"How fortunate are we to have met the Satpurush?","a":"Even by spending tens of millions of rupees, such a sadhu is unattainable. Even by giving tens of millions of rupees, such spiritual talks are unattainable. Even by giving tens of millions of rupees, this human body cannot be attained. And we, too, have taken tens of millions of births. But never have we had such company of the God-realized Sadhu. Otherwise why would we have to take birth? (Prakaran 1 - Vāt 19)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-8","num":"8","q":"What is the greatness of Satsang?","a":"This is an incredible opportunity and we have attained ultimate liberation. Today satsang is in the peak of its youth. We have received the central (soft and juicy) portion of the sugarcane. There is a lot of juice in it and is convenient to eat. (Prakaran 1 - Vāt 163)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-9","num":"9","q":"How great is the association of the Satpurush?","a":"The best of all is that we have attained the association of this God and this Sadhu. There is nothing better than this and there is nothing better to understand than this. And what is the worst of all? That one attributes human traits to this Sadhu -- there is nothing worse than this. (Prakaran 3 - Vāt 36)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-swaminivto-10","num":"10","q":"What is the importance of following the Satpurush's agna?","a":"To do as the Sadhu says is best. To do as per one's own wish is worst. And one who does as per his own wish, even though he observes austerities, does the work of the whole mandir and introduces many people to Satsang, is still inferior and some day will face an obstacle. To do as per the instructions of the Sadhu is without blemishes and to do as per one's own desire is full of blemishes. (Prakaran 2 - Vāt 57)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-english-satsangdiksha","name":"Satsang Diksha","cards":[{"id":"c-english-satsangdiksha-1","num":"1","q":"Parabrahma's Swarup","a":"Swaminarayan Bhagwan,the sovereign of Akshar, is the manifest form of Paramatma Parabrahman Purushottam Hari. (Shlok 96)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-2","num":"2","q":"Parabrahma's Bhakti","a":"He alone is forever our ishtadev worthy of supreme upāsanā. One should always offer singular devotion to him only. (Shlok 97)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-3","num":"3","q":"Gunatit Parampara","a":"Gunatitanand Swami is the manifest form of the eternal Aksharbrahman. This Aksharbrahman paramparā is manifest even today. (Shlok 98)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-4","num":"4","q":"Pragat Aksharbrahma Guru","a":"In the Sampraday's tradition of gurus that began with Gunatitanand Swami, only the present form of Aksharbrahman is our guru. (Shlok 99)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-5","num":"5","q":"Clarity on Philosophy","a":"Our ishtadev is the same, our guru is the same and our siddhānt is also the same -- thus, we are always united. (Shlok 100)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-6","num":"6","q":"Prabrahma's Swarup","a":"Bhagwan is eternally the all-doer, with form and supreme; he always remains manifest for the moksha of mumukshus. (Shlok 106)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-7","num":"7","q":"Prabrahma's Manifest Form","a":"Through the Aksharbrahman guru, Bhagwan always remains present with all of his divinity and bestows utmost bliss. (Shlok 107)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-8","num":"8","q":"Dradh Priti","a":"One should foster intense love and ātmabuddhi for the Aksharbrahman guru. Believing the guru as the manifest form of Bhagwan, one should serve him and meditate on him with devotion. (Shlok 108)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-9","num":"9","q":"Akshar Purushottam Upasana","a":"Identify one's ātmā, which is distinct from the three bodies, as brahmarup and always offer upāsanā to Parabrahman. (Shlok 116)","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-satsangdiksha-10","num":"10","q":"Sarva Karta","a":"One should understand that all which has happened, which is happening, and which will happen is solely due to Swaminarayan Bhagwan's will and only for my benefit. (Shlok 152)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-english-prasangs","name":"Prasangs","cards":[{"id":"c-english-prasangs-1","num":"1","q":"Nityanand Swami's Firmness in Upasana","a":"When Shriji Maharaj instructed Shatanand Muni to write the scripture Satsangijivan, a dispute arose, which has been recorded with slight variations in several scriptures of the Sampraday. The disagreement was about how Shriji Maharaj should be described in the Satsangijivan. This debate continued for seven to eight days. At that time, except for Nityanand Swami, the other paramhansas did not approve of the true glory of Shriji Maharaj being written in the scripture. However, Nityanand Swami firmly insisted that Shriji Maharaj must be described as the Supreme God. Extensive discussions took place between both sides on this matter, but everyone remained steadfast in their own position. Therefore, all of them requested Shriji Maharaj to resolve the dispute. At that time, Shriji Maharaj outwardly sided with the paramhansas. Instead of encouraging Nityanand Swami for remaining firm in his understanding, Bhagwan Swaminarayan did not speak to him for seven days. Not only that, He even excommunicated him. Yet, despite this, Nityanand Swami remained unwavering in his understanding. Finally, Shriji Maharaj called Nityanand Swami, adorned him with a garland, expressed His pleasure, and praised him, saying: \"O Paramhansas! We greatly insulted Nityanand Swami and tried to shake him by speaking contrary to his understanding, yet he did not waver. In truth, Nityanand Swami's understanding is the highest. Devotees should be like this. Therefore, all of you should understand as he understands.\"","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-2","num":"2","q":"Shitaldas Attains Conviction in Supremacy","a":"There was once a sannyasi named Shitaldas. He came from a town called Jharnaparna in Central India. He had set out in search of Bhagwan. Hearing Ramanand Swami's name, he came all the way to Gujarat. But when he came to Loj, he learned that Ramanand Swami had passed away. Disappointed, he was about to turn back towards home. But someone stopped him and said, \"Sahajanand Swami is in Ramanand Swami's place. He is very great.\" Shitaldas was not convinced. Yet, he made his way to a sabha in the village of Faneni. There, Shitaldas had the darshan of Shriji Maharaj. As their eyes met, Shitaldas went into samadhi. He saw Akshardham. In it were infinite muktas, Ramanand Swami, and others. Everyone was praying to Shriji Maharaj. Shitaldas performed Shriji Maharaj's pujan. He also wanted to do pujan of the infinite muktas. Knowing his desire, Shriji Maharaj told him, \"Make a wish that if these muktas or Ramanand Swami are Purushottam (sarvopari bhagwan), let me have infinite forms.\" Shitaldas did accordingly, but nothing happened. Then, Shriji Maharaj told him, \"Wish again that if I (Shriji Maharaj) am sarvopari, let me have infinite forms.\" As soon as Shitaldas thought this, he indeed appeared in infinite forms. He then did pujan of everyone at once. Shitaldas awoke from samadhi. He was convinced of Shriji Maharaj's greatness. He told everyone of his experience, \"Shriji Maharaj is the supreme, sarvavatari Bhagwan.\"","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-3","num":"3","q":"Bhai Atmanand Swami Understands Supremacy","a":"Sadguru Bhai Atmanand Swami was considered the embodiment of following agna. He never transgressed a single word of Maharaj's. He never cared for his bodily needs and always acted as the atma. He was 116 years old. Around that time, he asked Gunatitanand Swami, 'I have no desires at all, yet why does Maharaj not come to take me to Akshardham?' Then Gunatitanand Swami said, 'You have not yet gained firm faith in the supreme form of Maharaj. You are very dear to Shriji Maharaj, and you are a constant follower of Maharaj's agna, and Maharaj is also very dear to you, and you are very capable, but you have still have some small deficieny in understanding Maharaj's true form. Therefore, Maharaj knows that this Atmanand Swami is very dear to me and he cannot live without me. So even if he must live some more, but realises my form as it is, if he then leaves his body, he will enjoy the bliss of living with me forever. Thinking this, Maharaj has kept you alive, that is why Maharaj does not come to take you to Akshardham. Therefore, if I tell you about the form of Shreeji Maharaj, and if you instill it in your soul and make it firm in your soul, then Maharaj will immediately make you leave your body.' Then Swami reminded him of the occasions on which Maharaj had spoken of himself as the Supreme God and made him firm in the supreme form of Maharaj. After a short time, Maharaj took him to Akshardham.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-4","num":"4","q":"Protecting the Devotees from the Governor of Visnagar","a":"When the governor of Visnagar was persecuting the devotees, Maharaj quietly left Gadhada alone during the night. Mulji Brahmachari ran after Him and eventually caught up with Him. At that time, Maharaj said to the Brahmachari, \"The governor of Visnagar is causing suffering to Our devotees. Therefore, I am going there.\" Hearing this, the Brahmachari was astonished. Folding his hands, he said, \"O Prabhu! He is a great enemy. What will You do by going there alone? He openly says that if Swaminarayan comes here, he will imprison Him!\" Maharaj smiled and replied, \"Brahmachari, what do you think of Us?\" \"Maharaj, You are God.\" \"Then whose hands hold the governor's life and destiny?\" The Brahmachari could not answer this question. Maharaj gently placed His hand on the Brahmachari's head and said, \"Should We not go to relieve the suffering of Our devotees? That is Our very nature and glory.\" Saying this, Maharaj took the Brahmachari's hand and continued on His journey. Thus, Maharaj reached Visnagar and protected His devotees from the oppression of the governor.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-5","num":"5","q":"Abhe Sinh Attains Firm Faith","a":"Abhe Sinh of Lodhika did not have firm faith that Maharaj was the supreme God. Gunatitanand Swami Maharaj talked to him a lot based on the words and stories of Maharaj, yet he had doubts. Then Swami said, \"Am I a true sadhu with the thirty qualities or not?\" He said, 'Yes'. Swami said, \"Such a sadhu would lie?\" He said, 'No'. Swami said, \"So I am telling you that Maharaj is supreme. Believe what I say.\" Abhe Sinh immediately had firm faith in Maharaj. Abhe Sinh had witnessed Gunatitanand Swami's pure life first-hand and knew that he was a true Satpurush. Because of this faith, he immediately developed firm conviction in Maharaj's supremacy upon hearing Gunatitanand Swami's words.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-6","num":"6","q":"Jaha Sadguru Khele Vasant","a":"When Shriji Maharaj celebrated the fuldol festival at Rathod Dhadhal's house in Sarangpur, he himself said, '.... Jaha Sadguru khele vasant (where the sadguru plays in the spring).' Saying this, he addressed Muktanand Swami and Anand Swami, asking, 'Who is such a Sadguru?' Then the two replied, 'Such a Sadguru is you.' Maharaj then said, 'I am the worshipful Purushottam Bhagwan of the Sadguru. And such a Sadguru is this Gunatitanand Swami, Mul Akshar (the original Akshar).' Saying this, he pressed a stick against Swami's chest and said, 'Long live such a Yogi, long live such a Yogi.' Thus, Shriji Maharaj himself spoke of Swami's glory.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-7","num":"7","q":"Maharaj's Eternal Residence Akshardham","a":"In the court of Jinabhai in Panchala, Gunatitanand Swami was eating along with the five hundred Paramhansas. At that time, Maharaj said to Kalyanbhai of Vanthali: 'Do you recognize this sadhu?' To which he replied: 'Yes, he is a great ascetic, renunciant, and he understands the glory of all.' Maharaj then said: 'Not only that. He is my eternal residence, Akshardham.'","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-8","num":"8","q":"Washing Blankets and Swami's Greatness","a":"Once, Shriji Maharaj had kept Gunatitanand Swami in the service of sick sadhus. He would go to wash the blankets of the sick sadhus. Other sadhus that were not sick, knowing Swami as someone who did good seva, gave their blankets to wash too. Swami washed eighteen blankets and from Gomti lake arrived near the three gates. Maharaj returning from his meal from the house of Vasan Sutar. Near where the mandir's Hanuman gate stands today, Swami saw Maharaj and he looked intently at Maharaj, willing him to stop. Maharaj stopped in his tracks. As Swami approached, Maharaj quietly asked, \"May I go?\" Swami said, \"Of course, Maharaj.\" Maharaj entered the assembly and said to Bhaguji, \"Just remove the weight which that sadhu has placed on me.\" Two parshads went and took the washed blankets from Swami's shoulders. Then, Maharaj said, \"Tell the owners of these blankets to come and retrieve them.\" One by one, the sick sadhus came and took their blankets. However, the sadhus who were not sick, were too embarrassed to retrieve their blankets. Then Maharaj gathered the assembly and asked Brahmanand Swami, 'Do you know this sadhu?' He said: 'Yes, he sings a lot of kirtan. He does a lot of service and is certainly a complete renunciant.' Then Maharaj said, 'Not like that, he continuously beholds my murti in all three states. Thus, the multitudes of people who today flock to me will, in the future, flock to this sadhu. His greatness will be understood like mine is and will spread my supreme knowledge.' And so on, Maharaj spoke very highly of Swami.","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-9","num":"9","q":"Appointment as Mahant of Junagadh","a":"Once Maharaj was in Gadhada and Brahmanand Swami requested him, \"Maharaj, you have appointed mahants for each mandir, but appoint the mahant of Junagadh only after careful consideration.\" Maharaj said, \"Swami, we will appoint such a mahant that he will never have to be changed.\" Maharaj called Swami to the assembly and declared, \"Here is the mahant of Junagadh.\" Maharaj removed the flower garland around his neck and garlanded Gunatitanand Swami. Swami replied, \"Maharaj I won't be able to handle all of the administrative problems.\" Maharaj replied, \"I gave the garland to you. But, If you find anyone in this assembly willing to wear the garland of mahantship, pass it on to him and be free of it.\" Gopalanand Swami came over to Swami and said, \"It is Maharaj's wish so you should keep it.\" Maharaj understood Swami's dismay, so he said, \"Gopalanand Swami will handle your administration.\" Kurji Dave of Piplana was seated in that assembly. Maharaj looked at him and said, \"Kurji, You had come to Loj delivering the message that Ramanand Swami was arriving. Rejoicing at these Muktanand Swami had gifted you the turban on his head and I had told you that currently I have nothing to give, but that I would give you our Akshardham. You do remember that, don't you?\" Dave nodded. Maharaj said, \"Here, this Gunatitanand Swami is my Akshardham. I am giving him to you as a gift. Always serve him well.\"","memorized":false,"needsPractice":false,"test":null},{"id":"c-english-prasangs-10","num":"10","q":"Malji Soni's Darshan of Akshardham","a":"Once, both Acharyas, Raghuvirji Maharaj and Ayodhyaprasadji Maharaj, gathered in Vartal. Malji Soni of the village Bhoyka had come to the assembly too. At that time, three garlands were brought and two garlands were put on both the Acharyas, and one garland on Gopalanand Swami. Then he sat near Gopalanand Swami and asked, 'Swami! What is Akshardham like?' Then Swami said, 'Do you want to see?' Then he said, 'Yes Swami, you are capable, then show me.' Then the Swami said, 'This Gunatitanand Swami sitting near me is Akshar. Recognize him as such.'","memorized":false,"needsPractice":false,"test":null}]}]},{"id":"f-gujarati","name":"Gujarati","decks":[{"id":"d-gujarati-qa","name":"Q & A","cards":[{"id":"c-gujarati-qa-1","num":"1","q":"What is Upasana?","a":"'સ્વામી' એટલે અક્ષરબ્રહ્મ ગુણાતીતાનંદ સ્વામીઅને 'નારાયણ' એટલે પરબ્રહ્મ પુરુષોત્તમ સહજાનંદ સ્વામી. ઉપાસના એટલે અક્ષરરૂપ થઈને પુરુષોત્તમની સ્વામી-સેવકભાવે ભક્તિ કરવી.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-2","num":"2","q":"How should we understand Parabrahma's swarup?","a":"ભગવાન સ્વામિનારાયણ સર્વોપરી,દિવ્ય સાકાર, સર્વકર્તા અને પ્રગટ છે (એકાંતિક સત્પુરુષ દ્વારા આજે પણ પૃથ્વી પર વિરાજમાન છે).","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-3","num":"3","q":"What is the meaning of Akshar Purushottam?","a":"અક્ષર એટલે ગુણાતીતાનંદ સ્વામી અને પુરુષોત્તમ એટલે સહજાનંદ સ્વામી. ગુણાતીતાનંદ સ્વામી જેવા શુદ્ધ બનીને પુરુષોત્તમ પ્રત્યે ભક્તિ કરવી.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-4","num":"4","q":"Which are the five eternal entities?","a":"જીવ, ઈશ્વર, માયા, બ્રહ્મ અને પરબ્રહ્મ –- આ પાંચ અનાદિ તત્ત્વો છે.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-5","num":"5","q":"If Bhagwan is sarvopari then what's the need for Aksharbrahma?","a":"અક્ષરબ્રહ્મ જરૂરી છે કારણ કે તે ભગવાનનું દિવ્ય ધામ છે, આપણા માટે આદર્શ ભક્ત છે, અને 'મોક્ષના દ્વાર' સ્વરૂપે ભગવાનને પૃથ્વી પર સદાય પ્રગટ રાખે છે.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-6","num":"6","q":"What are the two things we need to attain Akshardham?","a":"ઉપાસના અને આજ્ઞા –- અક્ષરધામ પ્રાપ્ત કરવાના બે સાધનો છે.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-7","num":"7","q":"What is the purpose of mandirs?","a":"ઉપાસના અને ભક્તિનું સંરક્ષણ અને પોષણ કરવા માટે, તેમજ અક્ષરરૂપ આદર્શ ભક્ત સાથે પુરુષોત્તમની સેવા કરવા માટે મંદિરો બનાવવામાં આવે છે.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-8","num":"8","q":"What are the four forms of Aksharbrahma?","a":"૧. ભગવાનના દિવ્ય ધામ (અક્ષરધામ) તરીકે ૨. તે ધામમાં ભગવાનના વ્યક્તિગત સેવક તરીકે ૩. સર્વત્ર અને સર્વમાં વ્યાપક ચિદાકાશ સ્વરૂપે ૪. પૃથ્વી પર પ્રગટ ગુરુ સ્વરૂપે","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-9","num":"9","q":"Why is the presence of the Pragat Satpurush necessary in our spiritual life, even when scriptures, murtis, and sacred pilgrimage places exist?","a":"પ્રગટ સત્પુરુષની આવશ્યકતા: ૧. ભગવાનનો નિશ્ચય કરાવા ૨. જીવને બ્રહ્મરૂપ કરાવા ૩. પ્રત્યક્ષ ભગવાનના સુખનો અનુભવ કરાવા ૪. મોક્ષની પ્રાપ્તિ કરાવા","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-qa-10","num":"10","q":"Why is it necessary to become \"Brahmarup\"?","a":"બ્રહ્મરૂપ થવું એટલે સત્વ, રજ અને તમ –- આ ત્રણ ગુણોના પ્રભાવથી મુક્ત થવુંઅને દેહ, મન, અહંકાર તથા લૌકિક આસક્તિઓથી અલગ પોતાને આત્મારૂપે દૃઢપણે માનવું. બ્રહ્મરૂપ થયા પછી જ પુરુષોત્તમ ભગવાનની શુદ્ધ અને સર્વોપરિ ભક્તિ કરી શકે છે.","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-gujarati-vachanamrut","name":"Vachanamrut","cards":[{"id":"c-gujarati-vachanamrut-1","num":"1","q":"How is BAPS' darshan/philosophy unique from other Hindu darshans?","a":"વેદ, પુરાણ, ઇતિહાસ ને સ્મૃતિઓએ સર્વ શાસ્ત્રમાંથી અમે એ સિદ્ધાંત કર્યો છે જે, જીવ, માયા, ઈશ્વર, બ્રહ્મ અને પરમેશ્વર એ સર્વે અનાદિ છે. (Gadhada Section III - 10)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-2","num":"2","q":"What is our Upasana?","a":"પોતાના જીવાત્માને એ બ્રહ્મ સંગાથે એકતા કરીનેપરબ્રહ્મની સ્વામી-સેવકભાવે ઉપાસના કરવી. (Gadhada Section II - 3)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-3","num":"3","q":"Why is it important to understand Parabrahma's Swarup?","a":"ભગવાનના સ્વરૂપનું જ્ઞાન અને ભગવાનનું માહાત્મ્ય જાણવું એ બે અસાધારણ મોક્ષના હેતુ છે. (Gadhada Section I - 57)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-4","num":"4","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sarvopari?","a":"એવા સર્વોપરી જે પુરુષોત્તમ ભગવાન તે જ દયાએ કરીને જીવોના કલ્યાણને અર્થે આ પૃથ્વીને વિષે પ્રકટ થયા થકા સર્વ જનના નયનગોચર વર્તે છે ને તમારા ઇષ્ટદેવ છે ને તમારી સેવાને અંગીકાર કરે છે. (Gadhada Section III - 38)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-5","num":"5","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sakar and Divya?","a":"જે ભગવાન છે તે તેજોમય એવું જે પોતાનું અક્ષરધામ તેને વિષે સદા સાકારમૂર્તિ થકા વિરાજમાન છે. (Gadhada Section III - 32)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-6","num":"6","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sarva Karta?","a":"જેટલા કલ્યાણને અર્થે વ્યાસજીએ ગ્રંથ કર્યા છે તે સર્વે સૂરત રાખીને અમે સાંભળ્યા. તે સર્વે શાસ્ત્રમાં એ જ સિદ્ધાંત છે અને જીવના કલ્યાણને અર્થે પણ એટલી જ વાત છે જે, આ સર્વ જગત છે તેના કર્તાહર્તા એક ભગવાન છે. (Gadhada Section II - 21)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-7","num":"7","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Pragat?","a":"ભગવાન જીવના કલ્યાણને અર્થે જ્યારે મૂર્તિ ધારણ કરે છે ત્યારે પોતાનું જે અક્ષરધામ અને ચૈતન્યમૂર્તિ એવા જે પાર્ષદ અને પોતાનાં જે સર્વે ઐશ્વર્ય તે સહિત જ પધારે છે. (Gadhada Section I - 71)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-8","num":"8","q":"How should we worship Aksharbrahma?","a":"એવા જે સંત તેને મનુષ્ય જેવા ન જાણવા ને દેવ જેવા પણ ન જાણવા; કેમ જે, એવી ક્રિયા દેવ-મનુષ્યને વિષે હોય નહીં. અને એવા સંત મનુષ્ય છે તો પણ ભગવાનની પેઠે સેવા કરવા યોગ્ય છે. (Gadhada Section III - 26)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-9","num":"9","q":"What are the benefits of the Aksharbrahma Guru?","a":"સત્પુરુષને વિષે દૃઢ પ્રીતિ એ જ આત્મદર્શનનું સાધન છે અને સત્પુરુષનો મહિમા જાણ્યાનું પણ એ જ સાધન છે અને પરમેશ્વરનું સાક્ષાત્ દર્શન થવાનું પણ એ જ સાધન છે. (Vartal 11)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-vachanamrut-10","num":"10","q":"How do we attain Ekantik Dharma?","a":"સ્વધર્મ, જ્ઞાન, વૈરાગ્ય અને માહાત્મ્યજ્ઞાન તેણે સહિત જે ભગવાનની ભક્તિ તેણે યુક્ત એવા જે ભગવાનના એકાંતિક સાધુ તેના પ્રસંગ થકી ભાગવત ધર્મનું પોષણ થાય છે અને વળી જીવને મોક્ષનું જે દ્વાર તે પણ એવા સાધુના પ્રસંગ થકી ઉઘાડું થાય છે. (Gadhada Section I - 54)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-gujarati-swaminivto","name":"Swamini Vāto","cards":[{"id":"c-gujarati-swaminivto-1","num":"1","q":"What's our the goal in life?","a":"આપણો જન્મ બે વાત સાધવા સારુ થયો છે, તેમાં એક અક્ષરરૂપ થાવું, એમાં દેહ અંતરાયરૂપ છે; ને બીજું ભગવાનમાં જોડાવું, તેમાં સંગ અનેક પ્રકારના અંતરાયરૂપ છે. એ બે ખોટ ટાળવી. (Prakaran 4 - Vāt 99)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-2","num":"2","q":"Why is it important to understand Parabrahma's Swarup?","a":"ભગવાનના સ્વરૂપની નિષ્ઠા થઈ તેને સાધન સર્વે થઈ રહ્યાં, બાકી કાંઈ કરવું રહ્યું નથી. (Prakaran 1 - Vāt 123)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-3","num":"3","q":"How should we please Swaminarayan Bhagwan?","a":"એક તો ભગવાનની આજ્ઞા પાળવી અને બીજું સંતનું સ્વરૂપ સમજવું અને ત્રીજું ભગવાનનું સ્વરૂપ સમજવું, એ ત્રણ વાતમાં ભગવાન રાજી, રાજી ને રાજી છે; ને તેને ધન્ય છે, ધન્ય છે ને ધન્ય છે. એ ત્રણ વાત રાખવી. (Prakaran 1 - Vāt 165)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-4","num":"4","q":"Why should we surrender ourselves to the Satpurush?","a":"મોટા લગાર પણ દૃષ્ટિ કરે તો કામાદિક પીડી શકે નહીં ને પોતાની મેળે ગમે તેટલા દાખડા કરે પણ કામાદિક પરાભવ કર્યા વિના રહે જ નહીં. માટે મોટાનો દૃઢ આશરો કરવો. (Prakaran 5 - Vāt 250)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-5","num":"5","q":"How should we understand the greatness of Bhagwan and his Ekantik Sant?","a":"ભગવાન ને સાધુના મહિમાની વાતું નિરંતર કરવી ને સાંભળવી. ને મહારાજ તો પોતાનું અક્ષરધામ ને પાર્ષદ ને પોતાનું સમગ્ર ઐશ્વર્ય તે લઈને આંહીં પધાર્યા છે. તે એવા ને એવા જ છે. ને દેહ મૂકીને જેને પામવા છે, તે આજ દેહ છતાં મળ્યા છે, કાંઈ બાકી નથી; ને એમ ન સમજાય તેથી જીવમાં દુર્બળતા રહે છે, (Prakaran 1 - Vāt 1)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-6","num":"6","q":"What is the true form of our atma?","a":"કથા કરે, કીર્તન કરે, વાતું કરે, પણ 'આ દેહ હું નહિ,' એમ માને નહિ. માટે આઠે પહોર ભજન કરવું જે, હું દેહ નથી ને દેહમાં રહ્યો એવો જે હું આત્મા છું, બ્રહ્મ છું, અક્ષર છું ને મારે વિષે પરમાત્મા પરબ્રહ્મ પુરુષોત્તમ પ્રગટ પ્રમાણ અખંડ રહ્યા છે. (Prakaran 1 - Vāt 341)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-7","num":"7","q":"How fortunate are we to have met the Satpurush?","a":"કરોડ રૂપિયા ખરચતાં પણ આવા સાધુ મળે નહિ ને કરોડ રૂપિયા દેતાં પણ આ વાતું મળે નહિ ને કરોડ રૂપિયા આપતાં પણ મનુષ્યદેહ મળે નહિ ને આપણે પણ કરોડ જન્મ ધર્યા છે પણ કોઈ વખત આવો જોગ મળ્યો નથી. નીકર શું કરવા દેહ ધરવો પડે? (Prakaran 1 - Vāt 19)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-8","num":"8","q":"What is the greatness of Satsang?","a":"અલભ્ય લાભ મળ્યો છે અને આત્યંતિક મુક્તિને પામ્યા છીએ અને આજ તો સત્સંગની ભરજુવાની છે ને આજ તો શેરડીના સાંઠાનો વચલો ભાગ આપણને મળ્યો છે. તેમાં રસ ઘણો ને સુગમ પણ છે. (Prakaran 1 - Vāt 163)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-9","num":"9","q":"How great is the association of the Satpurush?","a":"સારામાં સારું તો આ ભગવાન ને આ સાધુનો સંબંધ થયો છે તેથી કાંઈ સારું નથી ને તેથી કાંઈ સારું સમજવાનું નથી ને ભૂંડામાં ભૂંડું શું છે? તો આ સાધુને વિષે મનુષ્યભાવ આવે છે તેથી બીજું કાંઈ ભૂંડું નથી. (Prakaran 3 - Vāt 36)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-swaminivto-10","num":"10","q":"What is the importance of following the Satpurush's agna?","a":"સંત કહે તેમ કરવું તે શ્રેષ્ઠ છે ને મનધાર્યું કરવું તે કનિષ્ઠ છે, ને મનગમતું કરતો હોય ને તે ત્યાગ રાખતો હોય ને આખા મંદિરનું કામ એકલો કરતો હોય ને ગમે એટલા માણસને સત્સંગ કરાવતો હોય, તો પણ તે ન્યૂન છે ને તેને કોઈક દિવસ વિઘ્ન છે... સંત કહે એમ કરવું એ નિર્ગુણ છે ને મનગમતું કરવું એ સગુણ છે. (Prakaran 2 - Vāt 57)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-gujarati-satsangdiksha","name":"Satsang Diksha","cards":[{"id":"c-gujarati-satsangdiksha-1","num":"1","q":"Parabrahma's Swarup","a":"અક્ષરાધિપતિ સ્વામિનારાયણ ભગવાન સાક્ષાત્ પરમાત્મા પરબ્રહ્મ પુરુષોત્તમ હરિ છે. (Shlok 96)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-2","num":"2","q":"Parabrahma's Bhakti","a":"એ એક જ આપણા સદા પરમ ઉપાસ્ય ઇષ્ટદેવ છે. તેમની જ અનન્ય ભાવે સદા ભક્તિ કરવી. (Shlok 97)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-3","num":"3","q":"Gunatit Parampara","a":"ગુણાતીતાનંદ સ્વામી સાક્ષાત્ સનાતન અક્ષરબ્રહ્મ છે. એ અક્ષરબ્રહ્મની પરંપરા આજે પણ વિરાજમાન છે. (Shlok 98)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-4","num":"4","q":"Pragat Aksharbrahma Guru","a":"સંપ્રદાયમાં ગુણાતીતાનંદ સ્વામીથી આરંભાયેલ ગુરુપરંપરામાં આવેલ પ્રગટ અક્ષરબ્રહ્મ એ એક જ આપણા ગુરુ છે. (Shlok 99)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-5","num":"5","q":"Clarity on Philosophy","a":"આપણા ઇષ્ટદેવ એક જ છે, ગુરુ એક જ છે અને સિદ્ધાંત પણ એક જ છે એમ આપણી સદા એકતા છે. (Shlok 100)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-6","num":"6","q":"Prabrahma's Swarup","a":"ભગવાન સદાય સર્વકર્તા, સાકાર, સર્વોપરી છે અને મુમુક્ષુઓની મુક્તિ માટે હંમેશાં પ્રગટ રહે છે. (Shlok 106)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-7","num":"7","q":"Prabrahma's Manifest Form","a":"અક્ષરબ્રહ્મસ્વરૂપ ગુરુ દ્વારા ભગવાન પોતાનાં સકળ ઐશ્વર્યો સહિત, પરમાનંદ અર્પતાં થકાં સદાય પ્રગટ રહે છે. (Shlok 107)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-8","num":"8","q":"Dradh Priti","a":"અક્ષરબ્રહ્મ ગુરુને વિષે દૃઢ પ્રીતિ અને આત્મબુદ્ધિ કરવી. તેમને વિષે પ્રત્યક્ષ ભગવાનનો ભાવ લાવીને ભક્તિએ કરીને તેમની સેવા તથા ધ્યાન કરવાં. (Shlok 108)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-9","num":"9","q":"Akshar Purushottam Upasana","a":"ત્રણ દેહથી વિલક્ષણ એવા પોતાના આત્માને વિષે બ્રહ્મરૂપની વિભાવના કરી સદૈવ પરબ્રહ્મની ઉપાસના કરવી. (Shlok 116)","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-satsangdiksha-10","num":"10","q":"Sarva Karta","a":"જે થઈ ગયું છે, થઈ રહ્યું છે અને જે કાંઈ આગળ થશે તે બધું જ સ્વામિનારાયણ ભગવાનની ઇચ્છાથી મારા હિત માટે જ છે એમ માનવું. (Shlok 152)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-gujarati-prasangs","name":"Prasangs","cards":[{"id":"c-gujarati-prasangs-1","num":"1","q":"Nityanand Swami's Firmness in Upasana","a":"શ્રીજીમહારાજે જ્યારે શતાનંદ મુનિને 'સત્સંગિજીવન' ગ્રંથ લખવાની આજ્ઞા કરી ત્યારે જે એક વિવાદ થયેલો, તેની નોંધ સંપ્રદાયના કેટલાય ગ્રંથોમાં આંશિક પાઠફેર સાથે મળી આવે છે. 'સત્સંગિજીવન' ગ્રંથમાં શ્રીજીમહારાજને કેવા વર્ણવવા તેનો એ વિવાદ ૭-૮ દિવસ સુધી ચાલેલો. આ સમયે નિત્યાનંદ સ્વામી સિવાયના સૌ પરમહંસો આ શાસ્ત્રમાં શ્રીજીમહારાજનો જે યથાર્થ મહિમા લખાતો હતો તે ગમ્યું નહી, પરંતુ નિત્યાનંદ સ્વામીએ દૃઢ આગ્રહ રાખેલો કે શ્રીજીમહારાજ સર્વોપરી તરીકે જ નિરૂપવા જોઈએ. આ વિષે બંને પક્ષે ખૂબ વિસ્તૃત ચર્ચા થઈ પણ સૌ પોતપોતાના પક્ષને વળગી રહ્યા. તેથી સૌએ આ વિવાદનો ઉકેલ લાવી આપવા શ્રીજીમહારાજને વિનંતી કરી. તે સમયે શ્રીજીમહારાજ પણ પરમહંસોના પક્ષમાં ભળી ગયા. નિત્યાનંદ સ્વામીને તેઓની સમજણમાં દૃઢ રહેવા બદલ પ્રોત્સાહિત કરવાને બદલે ભગવાન સ્વામિનારાયણ તેઓ સાથે સાત દિવસ સુધી બોલ્યા નહીં. એટલું જ નહીં, તેઓને બહિષ્કૃત કર્યા. છતાં નિત્યાનંદ સ્વામી તેઓની સમજણમાં દૃઢ રહ્યા. અંતે શ્રીજીમહારાજે નિત્યાનંદ સ્વામીને બોલાવ્યા, તેઓને પુષ્પહાર પહેરાવી રાજીપો દર્શાવ્યો અને તેઓને બિરદાવતાં કહ્યું : 'હે પરમહંસો! અમે નિત્યાનંદ સ્વામીનું ઘણું અપમાન કર્યું અને તેઓની સમજણથી વિરુદ્ધ કહીને તેઓને ડગાવવા પ્રયત્ન કર્યો પણ તેઓ ચલિત થયા નહીં. હકીકતે આ નિત્યાનંદ સ્વામીની સમજણ શ્રેષ્ઠ છે. ઉપાસક તો આવા જ હોવા જોઈએ. માટે તમારે સર્વેએ એ સમજે છે તેમ સમજવું.'","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-2","num":"2","q":"Shitaldas Attains Conviction in Supremacy","a":"એક વખત શીતળદાસ નામના એક સંન્યાસી હતા. તેઓ મધ્ય ભારતના ઝારણાપરાણા નામના ગામના રહેવાસી હતા. તેઓ ભગવાનની શોધમાં નીકળ્યા હતા. રામાનંદ સ્વામીનું નામ સાંભળીને તેઓ ગુજરાત સુધી આવ્યા. પરંતુ જ્યારે તેઓ લોજ પહોંચ્યા, ત્યારે તેમને ખબર પડી કે રામાનંદ સ્વામી ધામ પધારી ગયા હતા. આ સાંભળીને તેઓ નિરાશ થયા અને પાછા ઘરે જવાનું વિચાર્યું. ત્યારે કોઈએ તેમને રોકીને કહ્યું, \"રામાનંદ સ્વામીની જગ્યાએ સહજાનંદ સ્વામી છે. તેઓ બહુ મહાન છે.\" પરંતુ શીતળદાસને વિશ્વાસ આવ્યો નહીં. તેમ છતાં તેઓ ફણેની ગામમાં યોજાયેલી સભામાં ગયા. ત્યાં તેમણે શ્રીજી મહારાજના દર્શન કર્યા. બંનેની નજર મળી અને શીતળદાસ સમાધિમાં ચાલ્યા ગયા. સમાધિમાં તેમણે અક્ષરધામના દર્શન કર્યા. ત્યાં અનંત મુક્તો, રામાનંદ સ્વામી અને બીજા સૌ શ્રીજી મહારાજની પ્રાર્થના કરતા હતા. શીતળદાસે શ્રીજી મહારાજનું પૂજન કર્યું. ત્યારબાદ તેમની ઇચ્છા થઈ કે અનંત મુક્તોનું પણ પૂજન કરવું. તેમની આ ઇચ્છા જાણીને શ્રીજી મહારાજે કહ્યું, \"જો આ મુક્તો અથવા રામાનંદ સ્વામી પુરુષોત્તમ (સર્વોપરી ભગવાન) હોય, તો મને અનંત સ્વરૂપ પ્રાપ્ત થાય એવી ઇચ્છા કરો.\" શીતળદાસે તેમ કર્યું, પરંતુ કંઈ થયું નહીં. પછી શ્રીજી મહારાજે કહ્યું, \"હવે એવી ઇચ્છા કરો કે જો હું (શ્રીજી મહારાજ) સર્વોપરી હોઉં, તો મને અનંત સ્વરૂપ પ્રાપ્ત થાય.\" જેમ જ શીતળદાસે આ સંકલ્પ કર્યો, તેમ જ શ્રીજી મહારાજ અનંત સ્વરૂપે પ્રગટ થયા. ત્યારબાદ શીતળદાસે એકસાથે સૌનું પૂજન કર્યું. પછી તેઓ સમાધિમાંથી જાગ્યા. હવે તેમને શ્રીજી મહારાજના મહિમાનો દૃઢ નિશ્ચય થઈ ગયો હતો. તેમણે સૌને પોતાનો અનુભવ જણાવ્યો: \"શ્રીજી મહારાજ સર્વોપરી, સર્વાવતારી ભગવાન છે.\"","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-3","num":"3","q":"Bhai Atmanand Swami Understands Supremacy","a":"સદ્ગુરુ ભાયાત્માનંદ સ્વામીનો એક પ્રસંગ અહીં વિચારીએ. તેઓ વચનની મૂર્તિ ગણાતા. તેમણે શ્રીહરિનું એક પણ વચન હેઠું પડવા દીધું ન હતું. દેહભાવનો ભુક્કો બોલાવીને અખંડ આત્મા રૂપે વર્તનારા હતા. તેમની ઉંમર ૧૧૬ વર્ષની થઈ હતી. એ વખતે તેમણે અક્ષરબ્રહ્મ ગુણાતીતાનંદ સ્વામી મહારાજને પૂછ્યું, 'મને કંઈ વાસના નથી, છતાં મહારાજ કેમ તેડવા આવતા નથી ?' ત્યારે ગુણાતીતાનંદ સ્વામી મહારાજે કહ્યું, 'તમને હજુ મહારાજના સર્વોપરી સ્વરૂપની પાકી નિષ્ઠા થઈ નથી. શ્રીજીમહારાજને તમે બહુ વહાલા છો, ને મહારાજની આજ્ઞા અખંડ પાળનારા છો, ને મહારાજ પણ તમને બહુ વહાલા છે, ને મહાસમર્થ છો, પણ મહારાજનું સ્વરૂપ જેવું છે તેવું યથાર્થ જાણવામાં તમારે કાંઈક ફેર છે. માટે મહારાજ એમ જાણે છે જે, આ આત્માનંદ સ્વામી મને બહુ વહાલા છે ને મારી મૂર્તિ વિના તે રહી શકે એવા નથી, તે ઝાઝા દિવસ જીવીને પણ મારા સ્વરૂપને જેમ છે તેમ જાણીને પછી દેહ મૂકે તો મારી સમીપમાં રહેવાનું એમને સુખ આવે. એમ વિચારીને તમારો દેહ મહારાજ રાખ્યે જાય છે. તેથી મહારાજ તેડવા આવતા નથી. માટે શ્રીજીમહારાજના સ્વરૂપની હું તમને વાત કરું, તે પ્રમાણે અંતરમાં ઉતારીને જીવમાં ગેડ બેસાડી દ્યો, તો પછી તમારો દેહ તરત મહારાજ મુકાવી દેશે.' પછી સ્વામીએ, તેમને મહારાજે જે જે પ્રસંગે પોતે સર્વોપરી ભગવાન છે એવી વાત કરેલી, તે પ્રસંગો યાદ કરાવીને મહારજના સર્વોપરી સ્વરૂપની દૃઢતા કરાવી. પછી થોડા સમય બાદ મહારાજ તેમને ધામમાં લઈ ગયા.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-4","num":"4","q":"Protecting the Devotees from the Governor of Visnagar","a":"જ્યારે વિસનગરનો સૂબો હરિભક્તોને ત્રાસ આપતો હતો, ત્યારે મહારાજ રાત્રે ગઢડાથી એકલા નીકળી ગયા હતા. મૂળજી બ્રહ્મચારી તેમની પાછળ દોડ્યા અને તેમને પકડી પાડ્યા. ત્યારે મહારાજે બ્રહ્મચારીને કહ્યું : \"વીસનગરનો સૂબો આપણા હરિભક્તોને દુઃખ દે છે. તેથી હું ત્યાં જાઉં છું.\" આ સાંભળી બ્રહ્મચારીને આશ્ચર્ય થયું. તેણે હાથ જોડી કહ્યું : \"અરે પ્રભુ ! તે તો મહાદ્વેષી છે. આપ ત્યાં એકલા જઈને શું કરશો ? તે તો બોલે છે કે સ્વામિનારાયણ જો અહીં આવે તો હું તેને કેદમાં પૂરી દઈશ !\" મહારાજ આ સાંભળી હસ્યા. તેમણે કહ્યું : \"બહ્મચારી ! તમે અમને શું સમજો છો ?\" \"મહારાજ ! આપ ભગવાન છો.\" \"તો પછી સૂબાના નાડી-પ્રાણ કોના હાથમાં છે ?\" મહારાજના આ પ્રશ્નનો ઉત્તર બ્રહ્મચારી આપી શક્યા નહીં. મહારાજે બ્રહ્મચારીને માથે હાથ ફેરવ્યો. તેમને કહ્યું : \"ભક્તોના દુઃખની વહારે તો જવું જોઈએ ને ! એ તો અમારું બિરુદ છે.\" એટલું કહીને મહારાજે બ્રહ્મચારીનો હાથ પકડ્યો અને આગળ વાટ પકડી. આમ, મહારાજ વિસનગર પહોંચ્યા અને વિસનગરના સૂબાથી આપણા હરિભક્તોની રક્ષા કરી.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-5","num":"5","q":"Abhe Sinh Attains Firm Faith","a":"લોધિકાવાળા અભેસિંહ દરબારને શ્રીહરિની સર્વોપરી નિષ્ઠા બેસતી ન હતી. ગુણાતીતાનંદ સ્વામી મહારાજે તેમને શ્રીહરિની વાણી, તેમના પ્રસંગોને આધારે ખૂબ વાતો કરી; છતાં શંકા થયા કરે. ત્યારે સ્વામીએ કહ્યું, \"ત્રીસ લક્ષણે યુક્ત એવા સાધુ અમે ખરા કે નહીં ?\" તેમણે કહ્યું, 'હા'. સ્વામી કહે, \"એવા સાધુ હોય તે ખોટું બોલે ?\" તેઓ કહે, 'ના'. સ્વામી કહે, \"આ અમે તમને કહીએ છીએ જે, મહારાજ સર્વોપરી છે. તે અમારે વચને કરીને માનો.\" અભેસિંહને તરત નિષ્ઠા બેસી ગઈ. અભેસિંહે ગુણાતીતાનંદ સ્વામીનું નિર્મળ જીવન પ્રત્યક્ષ જોયું હતું અને તેઓ જાણતા હતા કે સ્વામી સાચા સત્પુરુષ છે. આ શ્રદ્ધાના કારણે, ગુણાતીતાનંદ સ્વામીના વચનો સાંભળતાં જ તેમને મહારાજની સર્વોપરિતામાં દૃઢ નિશ્ચય થઈ ગયો.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-6","num":"6","q":"Jaha Sadguru Khele Vasant","a":"શ્રીજીમહારાજે સારંગપુરમાં રાઠોડ ધાધલને ઘેર સમૈયો હુતાશનીનો કર્યો ત્યારે પોતે હોરી બોલે કે '.... સદ્‌ગુરુ ખેલે વસંત.' એમ બોલી મુક્તાનંદ સ્વામીને ને આનંદ સ્વામીને કહે કે એવા સદ્‌ગુરુ કોણ? ત્યારે તે બંને કહે : એવા સદ્‌ગુરુ આપ. ત્યારે મહારાજ કહે, \"હમો તો સાક્ષાત્‌ સદ્‌ગુરુના ઉપાસ્ય પુરુષોત્તમ ભગવાન છીએ. ને એવા સદ્‌ગુરુ તો આ ગુણાતીતાનંદ સ્વામી મૂળ અક્ષર છે.\" તેમ કહી સ્વામીની છાતીમાં છડી અડાડીને કહ્યું કે 'જુગો જુગ જીવો એવા જોગી, જુગો જુગ જીવો એવા જોગિયા.' એમ બોલી પ્રથમ શ્રીજીમહારાજે પોતે જ સ્વામીનો મહિમા શ્રીમુખે કહ્યો છે.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-7","num":"7","q":"Maharaj's Eternal Residence Akshardham","a":"પંચાળામાં ઝીણાભાઈના દરબારમાં પાંચસો પરમહંસોની પંક્તિમાં સ્વામી જમતા હતા. ત્યારે વણથળીવાળા કલ્યાણભાઈને મહારાજે કહ્યું કે 'આ સાધુને ઓળખો છો?' તો કહે : 'હા, બહુ મોટા તપસ્વી ને ત્યાગી, મહિમાવાળા છે.' તો કહે : 'એમ નહિ. તેઓ અમારે અખંડ રહેવાનું અક્ષરધામ છે.' એમ કલ્યાણભાઈને પોતે મહારાજે નિશ્ચય કરાવેલો.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-8","num":"8","q":"Washing Blankets and Swami's Greatness","a":"એક વખતે (સ્વામીને) શ્રીજીમહારાજે માંદા સાધુની સેવામાં રાખ્યા હતા. ત્યારે માંદાની ગોદડીઓ ધોવા જતાં, બીજા સારા સાધુઓએ પણ સ્વામીને સેવા કરનાર જાણી (ગોદડીઓ ધોવા) આપી હતી. તેમની અઢાર ગોદડી ધોઈ ગોમતીથી આવતાં ત્રણ દરવાજા પાસે સ્વામી આવ્યા. ને મહારાજ વાસણ સુતારને ઘેર જમીને આવ્યા. તે હનુમાનના દરવાજા બહાર સ્વામીએ દીઠા ને સ્વામીની વૃત્તિ પરોવાઈ એટલે મહારાજ ઊભા રહ્યા ને સ્વામી આવ્યા ત્યારે કહે : 'જઈએ?' ત્યારે કહે, 'જાવ.' પછી હરિમંડપમાં જઈને (મહારાજ) ભગુજીને કહે, 'એ સાધુએ ગોદડીઓ અમારી પર ધરી છે. તો તે ઉપાડી લાવો.' પછી બે પાળા જઈને ઉપાડી લાવ્યા. પછી સ્વામીને કહે : 'જેની હોય તે ગોદડીઓ લઈ જાય.' પછી માંદા સાધુ હતા તે લઈ ગયા પણ સાજા તો શરમાયા. તે દશ (સાધુ) ગોદડી લેવા ન આવ્યા. ત્યારે મહારાજે સભા કરીને બ્રહ્માનંદ સ્વામીને કહ્યું કે, 'આપ આ સાધુને ઓળખો છો?' તો કહે : 'હા, બહુ કીર્તન બોલે. બહુ સેવા કરે ને ત્યાગી નિશ્ચે સંપૂર્ણ છે.' ત્યારે મહારાજ કહે, 'એમ નહિ, એ તો અખંડ અમારી મૂર્તિ ત્રણ અવસ્થામાં ધારી રહ્યા છે. ને આજ જેટલા માણસ મારી વાંસે ફરે છે તેટલા માણસ તેમની પાછળ ફરશે. ને અમારા જેવી મોટપ થશે ને અમારું સર્વોપરી જ્ઞાન તે પ્રવર્તાવશે.' વગેરે સ્વામીનો બહુ મહિમા શ્રીજીએ કહેલ.","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-9","num":"9","q":"Appointment as Mahant of Junagadh","a":"એક વખત શ્રીજીમહારાજ ગઢડામાં બિરાજમાન હતા ત્યારે શ્રીજીમહારાજને બ્રહ્માનંદ સ્વામીએ કહ્યું કે, 'બીજા મંદિરના માનત (મહંત) તો આપણે કર્યા, પણ જૂનાગઢના માનત તો વિચારીને કરશો.' ત્યારે મહારાજ કહે, 'જૂનાગઢના માનત તો કદી નહિ ફરે તેવા કરીશ.' એમ કહી સ્વામીને સભામાં બોલાવ્યા ને મહારાજે કહ્યું કે, 'આ ગુણાતીતાનંદ સ્વામી જૂનાગઢના માનત.' એમ કહી પોતાના કંઠમાંથી હાર ઉતારીને પહેરાવ્યા. ત્યારે સ્વામી કહે, 'મારાથી થાય નહિ.' તો મહારાજ કહે : 'મેં તો આપને હાર આપ્યો. ને હવે બીજા કોઈ લે તો તેને આપો ને તમો આળસો.' તે વખતે ગોપાળાનંદ સ્વામી કહે : 'શ્રીજીમહારાજની ઇચ્છા છે તો ભલે આપ રાખો.' ત્યારે મહારાજ કહે : 'આ ગોપાળાનંદ સ્વામી તમારા કારભારી.' કહી સ્વામીને માનત કર્યા. તે વખતે પીપલાણાના કુંવરજી દવેને (કુરજી દવે) શ્રીજીમહારાજ કહે, 'આપ રામાનંદ સ્વામીની વધામણી લઈ લોજ આવ્યા ત્યારે મુક્તાનંદ સ્વામીએ માથાનો બાંધવાનો તરફાળ આપ્યો ને મેં કહ્યું કે મારી પાસે કશું નથી. હું તો તમને અક્ષરધામ આપીશ. તે કોલની તે વાત તમને સાંભરે છે?' તો કહે : 'હા.' 'તો ગુણાતીતાનંદ સ્વામી અક્ષરધામ છે. તે તમને આપ્યા. માટે અખંડ સેવા કરશો.'","memorized":false,"needsPractice":false,"test":null},{"id":"c-gujarati-prasangs-10","num":"10","q":"Malji Soni's Darshan of Akshardham","a":"એક વખત વરતાલમાં બે દેશના ગાદીના આચાર્ય ભેગા થયા હતા. ત્યારે સભામાં ગામ ભોયકાના માલજી સોની વરતાલ આવેલા. તે સભામાં થોડાક સાધુ ભરાયેલા. તે વખતે ત્રણ હાર લઈને આવ્યા ને બંને આચાર્યને બે હાર પહેરાવ્યા, ને એક હાર ગોપાળાનંદ સ્વામીને પહેરાવ્યો. પછી ગોપાળાનંદ સ્વામી પાસે બેઠા, ને સ્વામીને કહે, 'સ્વામી! અક્ષરધામ કેવું હશે?' ત્યારે કહે, 'તારે જોવું છે?' તો કહે, 'હા સ્વામી, આપ સમર્થ છો તે દેખાડો તો સારું.' ત્યારે સ્વામી કહે, 'આ મારી પાસે બેઠા (છે તે) ગુણાતીતાનંદ સ્વામી તે જ અક્ષર છે. તે ઓળખી લ્યો.'","memorized":false,"needsPractice":false,"test":null}]}]},{"id":"f-transliteration","name":"Transliteration","decks":[{"id":"d-transliteration-qa","name":"Q & A","cards":[{"id":"c-transliteration-qa-1","num":"1","q":"What is Upasana?","a":"'Swāmi' etale Aksharbrahma Gunātitānand Swāmi ane 'Nārāyan' etale Parabrahma Purushottam Sahajānand Swāmi. Upāsanā etale Aksharrup thaine Purushottamni Swāmi-sevakbhāve bhakti karvi.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-2","num":"2","q":"How should we understand Parabrahma's swarup?","a":"Bhagvān Swāminārāyan sarvopari, divya sākār, sarvakartā ane pragat chhe (ekāntik Satpurush dvārā āje pan pruthvi par virājmān chhe).","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-3","num":"3","q":"What is the meaning of Akshar Purushottam?","a":"Akshar etale Gunātitānand Swāmi ane Purushottam etale Sahajānand Swāmi. Gunātitānand Swāmi jevā shuddh banine Purushottam pratye bhakti karvi.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-4","num":"4","q":"Which are the five eternal entities?","a":"Jiv, Ishvar, Māyā, Brahma ane Parabrahma –- ā pānch anādi tattvo chhe.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-5","num":"5","q":"If Bhagwan is sarvopari then what's the need for Aksharbrahma?","a":"Aksharbrahma jaruri chhekāran ke te Bhagvānnu divya dhām chhe, āpnā māte ādarsh bhakta chhe, ane 'mokshanā dvār' svarupe Bhagvānne pruthvi par sadāy pragat rākhē chhe.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-6","num":"6","q":"What are the two things we need to attain Akshardham?","a":"Upāsanā ane āgnā –- Akshardhām prāpt karvānā be sādhano chhe.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-7","num":"7","q":"What is the purpose of mandirs?","a":"Upāsanā ane bhaktinu sanrakshan ane poshan karvā māte, temaj aksharrup ādarsh bhakta sāthe Purushottamni sevā karvā māte mandiro banāvāmā āve chhe.","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-8","num":"8","q":"What are the four forms of Aksharbrahma?","a":"1. Bhagvān nā divya dhām (Akshardhām) tarike 2. Te dhām mā Bhagvān nā vyaktigat sevak tarike 3. Sarvatra ane sarvamā vyāpak chidākāsh svarupe 4. Pruthvi par pragat Guru svarupe","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-9","num":"9","q":"Why is the presence of the Pragat Satpurush necessary in our spiritual life, even when scriptures, murtis, and sacred pilgrimage places exist?","a":"Pragat Satpurushni āvashyakatā: 1. Bhagvānno nishchay karāvā 2. Jivne Brahmarup karāvā 3. Pratyaksh Bhagvān nā sukhno anubhav karāvā 4. Mokshni prāpti karāvā","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-qa-10","num":"10","q":"Why is it necessary to become \"Brahmarup\"?","a":"Brahmarup thavu etale sattva, raja ane tama –- ā tran gunonā prabhāvthi mukta thavu ane deh, man, ahankār tathā laukik āsaktiothi alag potāne ātmārupe drudhpane mānvu. Brahmarup thayā pachhi ja Purushottam Bhagvān ni shuddh ane sarvopari bhakti kari shake chhe.","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-transliteration-vachanamrut","name":"Vachanamrut","cards":[{"id":"c-transliteration-vachanamrut-1","num":"1","q":"How is BAPS' darshan/philosophy unique from other Hindu darshans?","a":"Ved, Purāṇ, Itihās ne Smrutio e sarva shāstramāthi ame e siddhānt karyo chhe je, jiv, māyā, ishvar, Brahma ane Parameshvar e sarve anādi chhe. (Gadhada Section III - 10)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-2","num":"2","q":"What is our Upasana?","a":"Potānā jivātmāne e brahma sangāthe ekatā karine Parabrahmani Swāmi-sevakbhāve upāsanā karavi. (Gadhada Section II - 3)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-3","num":"3","q":"Why is it important to understand Parabrahma's Swarup?","a":"Bhagwānnā swarupnu gnān ane Bhagwānnu māhātmya jāṇavu e be asādhāraṇ mokshanā hetu chhe. (Gadhada Section I - 57)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-4","num":"4","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sarvopari?","a":"Evā sarvopari je Purushottam Bhagwān te ja dayāe karine jivonā kalyāṇne arthe ā pruthvine vishe prakat thayā thakā sarva jannā nayan-gochar varte chhe ne tamārā ishtadev chhe ne tamāri sevāne angikār kare chhe. (Gadhada Section III - 38)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-5","num":"5","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sakar and Divya?","a":"Je Bhagwān chhe te tejomay evu je potānu Akshardhām tene vishe sadā sākārmurti thakā virājmān chhe. (Gadhada Section III - 32)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-6","num":"6","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Sarva Karta?","a":"Jetalā kalyāṇne arthe Vyāsjie granth karyā chhe te sarve surat rākhine ame sāmbhaḷyā. Te sarve shāstramā e ja siddhānt chhe ane jivnā kalyāṇne arthe paṇ etali ja vāt chhe je, ā sarva jagat chhe tenā kartā-hartā ek Bhagwān chhe. (Gadhada Section II - 21)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-7","num":"7","q":"Which Vachnamrut talks about Bhagwan Swaminarayan being Pragat?","a":"Bhagwān jivnā kalyāṇne arthe jyāre murti dhāraṇ kare chhe tyāre potānu je Akshardhām ane Chaitanyamurti evā je pārshad ane potānā je sarve aishvarya te sahit ja padhāre chhe. (Gadhada Section I - 71)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-8","num":"8","q":"How should we worship Aksharbrahma?","a":"Evā je sant tene manushya jevā na jāṇavā ne dev jevā paṇ na jāṇavā; kem je, evi kriyā dev-manushyane vishe hoy nahi. Ane evā sant manushya chhe to paṇ Bhagwānni pethe sevā karavā yogya chhe. (Gadhada Section III - 26)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-9","num":"9","q":"What are the benefits of the Aksharbrahma Guru?","a":"Satpurushne vishe dradh priti e ja ātmadarshannu sādhan chhe ane satpurushno mahimā jāṇyānu paṇ e ja sādhan chhe ane Parameshvarnu sākshāt darshan thavānu paṇ e ja sādhan chhe. (Vartal 11)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-vachanamrut-10","num":"10","q":"How do we attain Ekantik Dharma?","a":"Swadharma, gnān, vairāgya ane māhātmyagnān teṇe sahit je Bhagwānni bhakti teṇe yukta evā je Bhagwānnā Ekāntik Sādhu tenā prasang thaki Bhāgwat Dharmanu poshaṇ thāy chhe ane vaḷi jivne mokshanu je dvār te paṇ evā Sādhunā prasang thaki ughādu thāy chhe. (Gadhada Section I - 54)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-transliteration-swaminivto","name":"Swamini Vāto","cards":[{"id":"c-transliteration-swaminivto-1","num":"1","q":"What's our the goal in life?","a":"Āpaṇo janma be vāt sādhavā sāru thayo chhe, temā ek Aksharrup thāvu, emā deh antarāyrup chhe; ne biju Bhagwānmā jodāvu, temā sang anek prakārnā antarāyrup chhe. E be khot tāḷavi. (Prakaran 4 - Vāt 99)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-2","num":"2","q":"Why is it important to understand Parabrahma's Swarup?","a":"Bhagwānnā swarupni nishthā thai tene sādhan sarve thai rahyā, bāki kāi karavu rahyu nathi. (Prakaran 1 - Vāt 123)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-3","num":"3","q":"How should we please Swaminarayan Bhagwan?","a":"Ek to Bhagwānni āgnā pāḷavi ane biju santnu swarup samajavu ane triju Bhagwānnu swarup samajavu, e traṇ vātmā Bhagwān rāji, rāji ne rāji chhe; ne tene dhanya chhe, dhanya chhe ne dhanya chhe. E traṇ vāt rākhavi. (Prakaran 1 - Vāt 165)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-4","num":"4","q":"Why should we surrender ourselves to the Satpurush?","a":"Motā lagār paṇ drashti kare to kāmādik pidi shake nahi ne potāni meḷe game tetalā dākhadā kare paṇ kāmādik parābhav karyā vinā rahe ja nahi. Māte Motāno dradh āsharo karavo. (Prakaran 5 - Vāt 250)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-5","num":"5","q":"How should we understand the greatness of Bhagwan and his Ekantik Sant?","a":"Bhagwān ne Sādhunā mahimāni vātu nirantar karavi ne sāmbhaḷvi. Ne Mahāraj to potānu Akshardhām ne pārshad ne potānu samagra aishvarya te laine āhi padhāryā chhe. Te evā ne evā ja chhe. Ne deh mukine jene pāmavā chhe, te āj deh chhatā maḷyā chhe, kāi bāki nathi; ne em na samajāy tethi jivmā durbaḷtā rahe chhe. (Prakaran 1 - Vāt 1)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-6","num":"6","q":"What is the true form of our atma?","a":"Kathā kare, kirtan kare, vātu kare, paṇ 'Ā deh hu nahi,' em māne nahi. Māte āthe pahor bhajan karavu je, 'Hu deh nathi ne dehmā rahyo evo je hu ātmā chhu, brahma chhu, Akshar chhu ne māre vishe Paramātmā Parabrahma Purushottam pragat pramāṇ akhand rahyā chhe. (Prakaran 1 - Vāt 341)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-7","num":"7","q":"How fortunate are we to have met the Satpurush?","a":"Karod rupiyā kharachtā paṇ āvā Sādhu maḷe nahi ne karod rupiyā detā paṇ ā vātu maḷe nahi ne karod rupiyā āpatā paṇ manushya-deh maḷe nahi; ne āpaṇe paṇ karod janma dharyā chhe, paṇ koi vakhat āvo jog maḷyo nathi. Nikar shu karavā deh dharavo pade? (Prakaran 1 - Vāt 19)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-8","num":"8","q":"What is the greatness of Satsang?","a":"Alabhya lābh maḷyo chhe ane ātyantik muktine pāmyā chhie ane āj to satsangni bharjuvāni chhe ne āj to sheradinā sāthāno vachalo bhāg āpaṇne maḷyo chhe. Temā ras ghaṇo ne sugam paṇ chhe. (Prakaran 1 - Vāt 163)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-9","num":"9","q":"How great is the association of the Satpurush?","a":"Sārāmā sāru to ā Bhagwān ne ā Sādhuno sambandh thayo chhe tethi kāi sāru nathi ne tethi kāi sāru samajavānu nathi ne bhundāmā bhundu shu chhe? To ā Sādhune vishe manushyabhāv āve chhe tethi biju kāi bhundu nathi. (Prakaran 3 - Vāt 36)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-swaminivto-10","num":"10","q":"What is the importance of following the Satpurush's agna?","a":"Sant kahe tem karavu te shreshth chhe ne mandhāryu karavu te kanishth chhe, ne mangamtu karato hoy ne te tyāg rākhato hoy ne ākhā mandirnu kām ekalo karato hoy ne game etalā māṇasne satsang karāvto hoy, to paṇ te nyun chhe ne tene koik divas vighna chhe... sant kahe em karavu e nirguṇ chhe ne mangamtu karavu e saguṇ chhe. (Prakaran 2 - Vāt 57)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-transliteration-satsangdiksha","name":"Satsang Diksha","cards":[{"id":"c-transliteration-satsangdiksha-1","num":"1","q":"Parabrahma's Swarup","a":"Aksharādhipati Swāminārāyaṇ Bhagwān sākshāt Paramātmā Parabrahma Purushottam Hari chhe. (Shlok 96)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-2","num":"2","q":"Parabrahma's Bhakti","a":"E ek ja āpaṇā sadā param upāsya ishtadev chhe. Temani ja ananya bhāve sadā bhakti karavi. (Shlok 97)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-3","num":"3","q":"Gunatit Parampara","a":"Guṇātitānand Swāmi sākshāt sanātan Aksharbrahma chhe. E Aksharbrahmani paramparā āje paṇ virājamān chhe. (Shlok 98)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-4","num":"4","q":"Pragat Aksharbrahma Guru","a":"Sampradāymā Guṇātitānand Swāmithi ārambhāyel guru-paramparāmā āvel pragat Aksharbrahma e ek ja āpaṇā guru chhe. (Shlok 99)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-5","num":"5","q":"Clarity on Philosophy","a":"Āpaṇā ishtadev ek ja chhe, guru ek ja chhe ane siddhānt paṇ ek ja chhe em āpaṇi sadā ekatā chhe. (Shlok 100)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-6","num":"6","q":"Prabrahma's Swarup","a":"Bhagwān sadāy sarva-kartā, sākār, sarvopari chhe ane mumukshuoni mukti māte hammeshā pragat rahe chhe. (Shlok 106)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-7","num":"7","q":"Prabrahma's Manifest Form","a":"Aksharbrahma-swarup guru dvārā Bhagwān potānā sakaḷ aishvaryo sahit, paramānand arpatā thakā sadāy pragat rahe chhe. (Shlok 107)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-8","num":"8","q":"Dradh Priti","a":"Aksharbrahma gurune vishe drudh priti ane ātmabuddhi karavi. Temane vishe pratyaksh Bhagwānno bhāv lāvine bhaktie karine temani sevā tathā dhyān karavā. (Shlok 108)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-9","num":"9","q":"Akshar Purushottam Upasana","a":"Traṇ dehthi vilakshaṇ evā potānā ātmāne vishe brahmarupni vibhāvanā kari sadaiv Parabrahmani upāsanā karavi. (Shlok 116)","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-satsangdiksha-10","num":"10","q":"Sarva Karta","a":"Je thai gayu chhe, thai rahyu chhe ane je kāi āgaḷ thashe te badhu ja Swāminārāyaṇ Bhagwānni ichchhāthi mārā hit māte ja chhe em mānavu. (Shlok 152)","memorized":false,"needsPractice":false,"test":null}]},{"id":"d-transliteration-prasangs","name":"Prasangs","cards":[{"id":"c-transliteration-prasangs-1","num":"1","q":"Nityanand Swami's Firmness in Upasana","a":"Shrijimahārāje jyāre Shatānand Munine 'Satsangijivan' granth lakhvāni āgnā kari tyāre je ek vivād thayelo, teni nondh sampradāynā ketlāy granthomā ānshik pāthpher sāthe maḷi āve chhe. 'Satsangijivan' granthmā Shrijimahārājne kevā varṇavvā teno e vivād 7-8 divas sudhi chālelo. Ā samaye Nityānand Swāmi sivāynā sau paramhanso ā shāstramā Shrijimahārājno je yathārth mahimā lakhāto hato te gamyu nahi, paṇ Nityānand Swāmie drudh āgrah rākhelo ke Shrijimahārāj sarvopari tarike ja nirupvā joie. Ā vishē banne pakshe khub vistrut charchā thai paṇ sau potpotānā pakshne vaḷgi rahyā. Tetheli saue ā vivādno ukel lāvi āpvā Shrijimahārājne vinanti kari. Te samaye Shrijimahārāj paṇ paramhansonā pakshmā bhaḷi gayā. Nityānand Swāmine teoni samjaṇmā drudh rahevā badal protsāhit karvāne badale Bhagvān Swāminārāyaṇ teo sāthe sāt divas sudhi bolyā nahi. Etlu ja nahi, teone bahishkrut karyā. Chhatā Nityānand Swāmi teoni samjaṇmā drudh rahyā. Ante Shrijimahārāje Nityānand Swāmine bolāvyā, teone pushpahār paherāvi rājipo darshāvyō ane teone biradāvtā kahyu: 'He paramhanso! Ame Nityānand Swāminu ghaṇu apmān karyu ane teoni samjaṇthi viruddh kahine teone dagāvavā prayatna karyo paṇ teo chalit thayā nahi. Hakikate ā Nityānand Swāmini samjaṇ shreshth chhe. Upāsak to āvā ja hovā joie. Māte tamāre sarve e samje chhe tem samajvu.'","memorized":false,"needsPractice":false,"test":null},{"id":"c-transliteration-prasangs-2","num":"2","q":"Shitaldas Attains Conviction in Supremacy","a":"Ek vakhat Shitaḷdās nāmnā ek sannyāsi hatā. Teo Madhya Bhāratnā Jhāraṇāparāṇā nāmnā gāmnā rahevāsi hatā. Teo Bhagvān ni shodhmā nikaḷyā hatā. Rāmānand Swāminu nām sāmbhaḷine teo Gujarāt sudhi āvyā. Paṇ jyāre teo Loj pahochyā, tyāre temne khabar padi ke Rāmānand Swāmi dhām padhāri gayā hatā. Ā sāmbhaḷine teo nirāsh thayā ane pāchhā ghare javānu vichāryu. Tyāre koie temne rokine kahyu, \"Rāmānand Swāmini jagyāe Sahajānand Swāmi chhe. Teo bahu mahān chhe.\" Paṇ Shitaḷdāsne vishvās āvyo nahi. Tem chhatā teo Phaṇeni gāmmā yojāyeli sabhāmā gayā. Tyā temne Shriji Mahārājnā darshan karyā. Bannēni najar maḷi ane Shitaḷdās samādhimā chālyā gayā. Samādhimā temne Akshardhāmnā darshan karyā. Tyā anant mukto, Rāmānand Swāmi ane bijā sau Shriji Mahārājni prārthanā kartā hatā. Shitaḷdāse Shriji Mahārājnu pūjan karyu. Tyārabād temni ichchhā thai ke anant muktonu paṇ pūjan karvu. Temni ā ichchhā jāṇine Shriji Mahārāje kahyu, \"Jo ā mukto athvā Rāmānand Swāmi Purushottam (sarvopari Bhagvān)
